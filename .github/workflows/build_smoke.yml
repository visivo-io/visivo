name: "Build & Smoke Test"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  build-smoke:
    name: "Build & Smoke (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Build viewer + install
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          cd viewer
          yarn install --network-timeout 600000 && yarn deploy
          cd ..
          poetry install
          poetry run write-schema-json

      - name: Build Artifact
        run: poetry run build

      - name: Smoke test built binary
        shell: bash
        run: bash scripts/smoke_test_binary.sh dist/visivo test-projects/docs-examples
