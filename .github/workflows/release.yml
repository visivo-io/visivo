name: "Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to release"
        required: true
        type: string
      dryrun:
        description: "Dry run"
        required: false
        type: boolean
        default: false

jobs:
  build-app:
    name: "Build App (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: darwin-arm64
          - os: windows-latest
            artifact_name: windows-x86
          - os: ubuntu-latest
            artifact_name: linux-x86

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Build App
        # Force bash on all OSes so `\"` escapes consistently. On windows-latest
        # the default shell is pwsh, where `\"` is literal (not an escape) -- it
        # silently wrote invalid Python to visivo/version.py and PyInstaller
        # then dropped the module, causing ModuleNotFoundError at runtime.
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          cd viewer
          yarn install --network-timeout 600000 && yarn deploy
          cd ..
          poetry install
          poetry run write-schema-json
          poetry run copy-install-script
          poetry version "$RELEASE_VERSION"
          echo "VISIVO_VERSION = \"$RELEASE_VERSION\"" > visivo/version.py
          # Guard against future shell-quoting regressions: fail fast if the
          # file we just wrote isn't valid Python.
          poetry run python -c "import ast, pathlib; ast.parse(pathlib.Path('visivo/version.py').read_text())"

      - name: Build Artifact
        run: poetry run build

      - name: Smoke test built binary
        shell: bash
        run: bash scripts/smoke_test_binary.sh dist/visivo test-projects/docs-examples

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: visivo-${{ matrix.artifact_name }}
          path: dist/visivo

  create-release:
    name: "Create release v${{ inputs.version }}"
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BYPASS_RULES_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Build App
        run: |
          cd viewer && yarn install && yarn deploy && cd ..
          poetry install
          poetry run write-schema-json
          poetry run copy-install-script
          poetry version ${{ inputs.version }}
          echo "VISIVO_VERSION = \"${{ inputs.version }}\"" > visivo/version.py

      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        if: ${{ inputs.dryrun == false }}
        with:
          author_name: Visivo
          author_email: info@visivo.io
          message: "Build viewer for Python package"

      - name: Add and push version tag
        if: ${{ inputs.dryrun == false }}
        run: |
          git config --global user.email "info@visivo.io"
          git config --global user.name "Visivo"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin tag v${{ inputs.version }}

      - name: Add and push latest tag
        if: ${{ inputs.dryrun == false }}
        run: |
          git config --global user.email "info@visivo.io"
          git config --global user.name "Visivo"
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          git tag -a latest -m "Latest versioned release"
          git push origin tag latest

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Zip artifacts
        run: |
          mkdir -p ./dists
          for dir in ./artifacts/*; do
            if [ -d "$dir" ]; then
              cd "$dir"
              zip -r "../../dists/$(basename $dir).zip" ./*
              cd ../..
            fi
          done

      - name: Create version release
        if: ${{ inputs.dryrun == false }}
        run: |
          gh release create "v${{ inputs.version }}" -t "Release v${{ inputs.version }}" --generate-notes ./dists/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        id: publish
        if: ${{ inputs.dryrun == false }}
        run: |
          poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
          poetry build
          poetry publish

      - name: Trigger Core Deployment
        if: ${{ inputs.dryrun == false }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CORE_DEPLOY_TOKEN }}
          repository: visivo-io/core
          event-type: visivo-release
