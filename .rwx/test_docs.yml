on:
  github:
    pull_request:
      actions: [opened, reopened, synchronize]
      init:
        commit-sha: ${{ event.git.sha }}
        pr-num: ${{ event.github.pull_request.pull_request.number }}

base:
  image: ubuntu:22.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: mint/git-clone 1.6.4
    with:
      repository: https://github.com/visivo-io/visivo.git
      preserve-git-dir: true
      ref: ${{ init.commit-sha }}
      github-access-token: ${{ github.token }}

  - key: versions
    use: code
    run: cat .python-version | tee $RWX_VALUES/python
    filter: [.python-version]

  - key: python
    call: mint/install-python 1.3.2
    with:
      python-version: ${{ tasks.versions.values.python }}

  - key: cli-dependencies
    use: [code, python]
    run: pip install poetry && poetry install --with dev --no-root
    filter:
      - poetry.lock
      - pyproject.toml

  - key: mkdocs
    use: cli-dependencies
    run: |
      poetry install --with dev
      poetry run pytest tests/parsers/test_schema_generator.py
      find tmp -name visivo_schema.json -exec cp {} ./mkdocs/assets \;
      poetry run python mkdocs/src/write_mkdocs_markdown_files.py
      poetry run mkdocs serve > mkdocs.log 2>&1 &
      sh mkdocs/check-connection.sh
      wget --recursive --no-verbose --spider http://127.0.0.1:8000/ 2>&1 | grep -v -E 'OK$|^unlink|\.tmp\.tmp'
      PYTHONPATH=$PWD poetry run mkdocs build 2>&1 | tee build_stdout.txt

  - key: check-for-spelling-errors
    use: mkdocs
    run: sh validate_mkdocs_build.sh
    filter:
      - build_stdout.txt
      - validate_mkdocs_build.sh

  - key: github-cli
    call: github/install-cli 1.0.5

  # Per-PR docs preview app. Serves the built site (site_dir: mkdocs_build) on an
  # on-demand rwx.run URL; spins down after 10 min idle and re-materializes from
  # the task cache when the URL is hit again.
  - key: docs-preview
    use: [mkdocs]
    app:
      endpoint: docs-pr-${{ init.pr-num }}
      port: 8000
      timeout: 2m
    run: python3 -m http.server $PORT --directory mkdocs_build

  - key: comment-preview-link
    use: [code, github-cli]
    run: |
      BODY="📚 Docs preview: $DOCS_PREVIEW_URL"
      COMMENT_ID=$(gh api "repos/visivo-io/visivo/issues/${{ init.pr-num }}/comments" --jq '[.[] | select(.body | startswith("📚 Docs preview:"))][0].id // empty')
      if [ -n "$COMMENT_ID" ]; then
        gh api -X PATCH "repos/visivo-io/visivo/issues/comments/$COMMENT_ID" -f body="$BODY" > /dev/null
      else
        gh pr comment ${{ init.pr-num }} --body "$BODY"
      fi
    env:
      DOCS_PREVIEW_URL: ${{ tasks.docs-preview.app.url.friendly }}
      GH_TOKEN: ${{ vaults.default.github-apps.mint-automation-visivo.token }}
