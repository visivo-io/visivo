on:
  github:
    pull_request:
      actions: [opened, reopened, synchronize, closed]
      init:
        commit-sha: ${{ event.git.sha }}
        pr-num: ${{ event.github.pull_request.pull_request.number }}
        head-ref: ${{ event.git.branch}}
        deploy: ${{ event.github.pull_request.pull_request.merged == false && event.github.pull_request.pull_request.state == 'open' }}
        archive: ${{ event.github.pull_request.pull_request.state == 'closed' }}

base:
  image: ubuntu:22.04
  config: rwx/base 1.1.1

tasks:
  - key: code
    call: git/clone 1.9.5
    with:
      preserve-git-dir: true
      repository: https://github.com/visivo-io/visivo.git
      ref: ${{ init.commit-sha }}
      github-access-token: ${{ vaults.default.github-apps.mint-automation-visivo.token }}

  - key: python
    call: python/install 1.4.5
    with:
      python-version: 3.14.6

  - key: github-cli
    call: github/install-cli 1.0.10

  - key: install-visivo
    if: ${{ init.deploy }}
    use: [python]
    run: pip install git+https://github.com/visivo-io/visivo.git@${{ init.head-ref }}
    filter: [visivo]

  - key: install-visivo-for-archive
    if: ${{ init.archive }}
    use: [python]
    run: pip install git+https://github.com/visivo-io/visivo.git@main
    filter: [visivo]

  - key: run-visivo
    if: ${{ init.deploy }}
    use: [install-visivo, code]
    run: |
      cd test-projects/integration
      visivo --version
      visivo run 

  - key: sanitize-stage-name
    run: |
      SANITIZED_STAGE_NAME=$(echo "${{ init.head-ref }}" | sed 's|[/.-]|_|g')
      echo $SANITIZED_STAGE_NAME > $RWX_ENV/SANITIZED_STAGE_NAME
      echo "Sanitized stage name: $SANITIZED_STAGE_NAME"

  - key: deploy-ci-stage
    if: ${{ init.deploy }}
    use: [run-visivo, github-cli, sanitize-stage-name]
    run: |
      cd test-projects/integration
      visivo deploy -s ${SANITIZED_STAGE_NAME}-mint --host https://app.development.visivo.io | tee /dev/stderr | grep 'Deployed to: ' > deployed.txt
      # Upsert the deploy comment. `gh pr comment --edit-last` resolves "last
      # comment by the current user" via /user, which app-installation tokens
      # cannot call — it failed silently on every run and the fallback posted a
      # duplicate. Find the bot's previous comment explicitly and PATCH it.
      COMMENT_ID=$(gh api "repos/visivo-io/visivo/issues/${{ init.pr-num }}/comments?per_page=100" --paginate \
        --jq '[.[] | select(.user.login == "mint-automation-visivo[bot]") | select(.body | startswith("Deployed to: "))] | last | .id' 2>/dev/null || true)
      if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
        gh api -X PATCH "repos/visivo-io/visivo/issues/comments/${COMMENT_ID}" -F body=@deployed.txt > /dev/null
      else
        gh pr comment ${{ init.pr-num }} -F deployed.txt
      fi
    env:
      VISIVO_TOKEN: ${{ secrets.VISIVO_DEVELOPMENT_TOKEN }}
      GH_TOKEN: ${{ vaults.default.github-apps.mint-automation-visivo.token }}

  - key: archive-ci-stage
    if: ${{ init.archive }}
    use: [install-visivo-for-archive, code, github-cli, sanitize-stage-name]
    run: |
      visivo archive -s ${SANITIZED_STAGE_NAME}-mint --host https://app.development.visivo.io
      gh pr comment ${{ init.pr-num }} --body "Archived stage associated with PR"
    env:
      VISIVO_TOKEN: ${{ secrets.VISIVO_DEVELOPMENT_TOKEN }}
      GH_TOKEN: ${{ vaults.default.github-apps.mint-automation-visivo.token }}
