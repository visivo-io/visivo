on:
  github:
    pull_request:
      actions: [opened, reopened, synchronize]
      init:
        commit-sha: ${{ event.git.sha }}
        pr-num: ${{ event.github.pull_request.pull_request.number }}

base:
  image: ubuntu:22.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: mint/git-clone 1.6.4
    with:
      preserve-git-dir: true
      repository: https://github.com/visivo-io/visivo.git
      ref: ${{ init.commit-sha }}
      github-access-token: ${{ vaults.default.github-apps.mint-automation-visivo.token }}
      fetch-full-depth: true

  - key: versions
    use: code
    run: |
      cat .python-version | tee $RWX_VALUES/python
      cat viewer/.nvmrc | sed 's/^v//' | tee $RWX_VALUES/node
    filter:
      - .python-version
      - viewer/.nvmrc

  - key: python
    call: mint/install-python 1.3.2
    with:
      python-version: ${{ tasks.versions.values.python }}

  - key: node
    call: mint/install-node 1.1.4
    with:
      node-version: ${{ tasks.versions.values.node }}

  - key: poetry
    use: python
    # Pinned to 1.8.x — poetry 2.x rejects 1.x-generated locks as "stale".
    run: pip install 'poetry>=1.8,<2'

  - key: yarn
    use: node
    run: npm install --global yarn

  - key: github-cli
    call: github/install-cli 1.0.10

  - key: cli-deps
    use: [code, poetry]
    run: poetry install --with dev --no-root
    filter:
      - poetry.lock
      - pyproject.toml

  - key: node-modules
    use: [code, yarn]
    run: |
      cd viewer
      yarn install
    filter:
      - viewer/package.json
      - viewer/yarn.lock

  - key: diff-stats
    use: code
    run: |
      git fetch origin main
      git diff --numstat origin/main...HEAD > /tmp/numstat.txt

      BE_PROD_ADD=0; BE_PROD_DEL=0; BE_PROD_FILES=0
      FE_PROD_ADD=0; FE_PROD_DEL=0; FE_PROD_FILES=0
      BE_TEST_UNIT_ADD=0; BE_TEST_UNIT_DEL=0; BE_TEST_UNIT_FILES=0
      BE_TEST_INT_ADD=0; BE_TEST_INT_DEL=0; BE_TEST_INT_FILES=0
      BE_TEST_E2E_ADD=0; BE_TEST_E2E_DEL=0; BE_TEST_E2E_FILES=0
      FE_TEST_UNIT_ADD=0; FE_TEST_UNIT_DEL=0; FE_TEST_UNIT_FILES=0
      FE_TEST_E2E_ADD=0; FE_TEST_E2E_DEL=0; FE_TEST_E2E_FILES=0
      OTHER_ADD=0; OTHER_DEL=0; OTHER_FILES=0

      > /tmp/be_prod_files.txt
      > /tmp/fe_prod_files.txt

      while IFS=$'\t' read -r added deleted filepath; do
        [ "$added" = "-" ] && continue

        # Resolve git rename syntax "dir/{old => new}/file" → "dir/new/file"
        # so existence checks below match the post-rename location.
        if echo "$filepath" | grep -q '{.* => .*}'; then
          filepath=$(echo "$filepath" | sed 's|{[^}]* => \([^}]*\)}|\1|')
        fi

        if echo "$filepath" | grep -qE '^tests/integration/'; then
          BE_TEST_INT_ADD=$((BE_TEST_INT_ADD + added))
          BE_TEST_INT_DEL=$((BE_TEST_INT_DEL + deleted))
          BE_TEST_INT_FILES=$((BE_TEST_INT_FILES + 1))
        elif echo "$filepath" | grep -qE '^tests/sandbox/'; then
          BE_TEST_E2E_ADD=$((BE_TEST_E2E_ADD + added))
          BE_TEST_E2E_DEL=$((BE_TEST_E2E_DEL + deleted))
          BE_TEST_E2E_FILES=$((BE_TEST_E2E_FILES + 1))
        elif echo "$filepath" | grep -qE '^tests/'; then
          BE_TEST_UNIT_ADD=$((BE_TEST_UNIT_ADD + added))
          BE_TEST_UNIT_DEL=$((BE_TEST_UNIT_DEL + deleted))
          BE_TEST_UNIT_FILES=$((BE_TEST_UNIT_FILES + 1))
        elif echo "$filepath" | grep -qE '^viewer/e2e/'; then
          FE_TEST_E2E_ADD=$((FE_TEST_E2E_ADD + added))
          FE_TEST_E2E_DEL=$((FE_TEST_E2E_DEL + deleted))
          FE_TEST_E2E_FILES=$((FE_TEST_E2E_FILES + 1))
        elif echo "$filepath" | grep -qE '^viewer/src/.*\.test\.(js|jsx)$'; then
          FE_TEST_UNIT_ADD=$((FE_TEST_UNIT_ADD + added))
          FE_TEST_UNIT_DEL=$((FE_TEST_UNIT_DEL + deleted))
          FE_TEST_UNIT_FILES=$((FE_TEST_UNIT_FILES + 1))
        elif echo "$filepath" | grep -qE '^visivo/.*\.py$'; then
          BE_PROD_ADD=$((BE_PROD_ADD + added))
          BE_PROD_DEL=$((BE_PROD_DEL + deleted))
          BE_PROD_FILES=$((BE_PROD_FILES + 1))
          # Skip deleted files — coverage lookup has nothing to report on them.
          [ -f "$filepath" ] && echo "$filepath" >> /tmp/be_prod_files.txt
        elif echo "$filepath" | grep -qE '^viewer/src/'; then
          FE_PROD_ADD=$((FE_PROD_ADD + added))
          FE_PROD_DEL=$((FE_PROD_DEL + deleted))
          FE_PROD_FILES=$((FE_PROD_FILES + 1))
          # Skip deleted files — coverage lookup has nothing to report on them.
          [ -f "$filepath" ] && echo "$filepath" >> /tmp/fe_prod_files.txt
        else
          OTHER_ADD=$((OTHER_ADD + added))
          OTHER_DEL=$((OTHER_DEL + deleted))
          OTHER_FILES=$((OTHER_FILES + 1))
        fi
      done < /tmp/numstat.txt

      cat > .diff_stats.env << STATSEOF
      BE_PROD_ADD=${BE_PROD_ADD}
      BE_PROD_DEL=${BE_PROD_DEL}
      BE_PROD_FILES=${BE_PROD_FILES}
      FE_PROD_ADD=${FE_PROD_ADD}
      FE_PROD_DEL=${FE_PROD_DEL}
      FE_PROD_FILES=${FE_PROD_FILES}
      BE_TEST_UNIT_ADD=${BE_TEST_UNIT_ADD}
      BE_TEST_UNIT_DEL=${BE_TEST_UNIT_DEL}
      BE_TEST_UNIT_FILES=${BE_TEST_UNIT_FILES}
      BE_TEST_INT_ADD=${BE_TEST_INT_ADD}
      BE_TEST_INT_DEL=${BE_TEST_INT_DEL}
      BE_TEST_INT_FILES=${BE_TEST_INT_FILES}
      BE_TEST_E2E_ADD=${BE_TEST_E2E_ADD}
      BE_TEST_E2E_DEL=${BE_TEST_E2E_DEL}
      BE_TEST_E2E_FILES=${BE_TEST_E2E_FILES}
      FE_TEST_UNIT_ADD=${FE_TEST_UNIT_ADD}
      FE_TEST_UNIT_DEL=${FE_TEST_UNIT_DEL}
      FE_TEST_UNIT_FILES=${FE_TEST_UNIT_FILES}
      FE_TEST_E2E_ADD=${FE_TEST_E2E_ADD}
      FE_TEST_E2E_DEL=${FE_TEST_E2E_DEL}
      FE_TEST_E2E_FILES=${FE_TEST_E2E_FILES}
      OTHER_ADD=${OTHER_ADD}
      OTHER_DEL=${OTHER_DEL}
      OTHER_FILES=${OTHER_FILES}
      STATSEOF

      cp /tmp/be_prod_files.txt .be_prod_files.txt
      cp /tmp/fe_prod_files.txt .fe_prod_files.txt

  - key: python-coverage
    use: cli-deps
    run: |
      poetry install --with dev
      poetry run pytest tests/ \
        --ignore=tests/integration \
        --ignore=tests/sandbox \
        --override-ini="addopts=" \
        --cov=visivo \
        --cov-report=json:coverage-python.json \
        -q || true
    env:
      STACKTRACE: true

  - key: js-coverage
    use: node-modules
    run: |
      cd viewer
      yarn test \
        --watchAll=false \
        --coverage \
        --coverageReporters=json-summary \
        --coverageDirectory=../coverage-js \
        || true

  - key: post-comment
    use: [diff-stats, python-coverage, js-coverage, github-cli, code]
    run: |
      source .diff_stats.env

      # === Parse Python coverage for changed backend files ===
      PY_COVERAGE_ROWS=""
      if [ -f coverage-python.json ] && [ -s .be_prod_files.txt ]; then
        while IFS= read -r filepath; do
          [ -z "$filepath" ] && continue
          COV_PCT=$(python3 -c "
      import json, sys
      with open('coverage-python.json') as f:
          data = json.load(f)
      target = '${filepath}'
      for key, val in data.get('files', {}).items():
          if key.endswith(target) or key.endswith(target.lstrip('./')):
              summary = val.get('summary', {})
              total = summary.get('num_statements', 0)
              covered = summary.get('covered_lines', 0)
              pct = round(100 * covered / total, 1) if total > 0 else 100.0
              print(pct)
              sys.exit(0)
      print('N/A')
      " 2>/dev/null || echo "N/A")

          if [ "$COV_PCT" = "N/A" ]; then
            PY_COVERAGE_ROWS="${PY_COVERAGE_ROWS}| \`${filepath}\` | No data | :grey_question: |
      "
          else
            IS_LOW=$(python3 -c "print('YES' if float('${COV_PCT}') < 50 else 'NO')" 2>/dev/null || echo "NO")
            if [ "$IS_LOW" = "YES" ]; then
              PY_COVERAGE_ROWS="${PY_COVERAGE_ROWS}| \`${filepath}\` | ${COV_PCT}% | :warning: Low |
      "
            else
              PY_COVERAGE_ROWS="${PY_COVERAGE_ROWS}| \`${filepath}\` | ${COV_PCT}% | :white_check_mark: |
      "
            fi
          fi
        done < .be_prod_files.txt
      fi

      # === Parse JS coverage for changed frontend files ===
      JS_COVERAGE_ROWS=""
      if [ -f coverage-js/coverage-summary.json ] && [ -s .fe_prod_files.txt ]; then
        while IFS= read -r filepath; do
          [ -z "$filepath" ] && continue
          RELATIVE_PATH=$(echo "$filepath" | sed 's|^viewer/||')
          COV_PCT=$(python3 -c "
      import json, sys
      with open('coverage-js/coverage-summary.json') as f:
          data = json.load(f)
      target = '${RELATIVE_PATH}'
      for key, val in data.items():
          if key == 'total':
              continue
          if key.endswith(target) or target in key:
              pct = val.get('lines', {}).get('pct', 'N/A')
              print(pct)
              sys.exit(0)
      print('N/A')
      " 2>/dev/null || echo "N/A")

          if [ "$COV_PCT" = "N/A" ]; then
            JS_COVERAGE_ROWS="${JS_COVERAGE_ROWS}| \`${filepath}\` | No data | :grey_question: |
      "
          else
            IS_LOW=$(python3 -c "print('YES' if float('${COV_PCT}') < 50 else 'NO')" 2>/dev/null || echo "NO")
            if [ "$IS_LOW" = "YES" ]; then
              JS_COVERAGE_ROWS="${JS_COVERAGE_ROWS}| \`${filepath}\` | ${COV_PCT}% | :warning: Low |
      "
            else
              JS_COVERAGE_ROWS="${JS_COVERAGE_ROWS}| \`${filepath}\` | ${COV_PCT}% | :white_check_mark: |
      "
            fi
          fi
        done < .fe_prod_files.txt
      fi

      # === Compute totals ===
      TOTAL_PROD_ADD=$((BE_PROD_ADD + FE_PROD_ADD))
      TOTAL_PROD_DEL=$((BE_PROD_DEL + FE_PROD_DEL))
      TOTAL_PROD_FILES=$((BE_PROD_FILES + FE_PROD_FILES))
      TOTAL_TEST_ADD=$((BE_TEST_UNIT_ADD + BE_TEST_INT_ADD + BE_TEST_E2E_ADD + FE_TEST_UNIT_ADD + FE_TEST_E2E_ADD))
      TOTAL_TEST_DEL=$((BE_TEST_UNIT_DEL + BE_TEST_INT_DEL + BE_TEST_E2E_DEL + FE_TEST_UNIT_DEL + FE_TEST_E2E_DEL))
      TOTAL_TEST_FILES=$((BE_TEST_UNIT_FILES + BE_TEST_INT_FILES + BE_TEST_E2E_FILES + FE_TEST_UNIT_FILES + FE_TEST_E2E_FILES))

      # === Build PR comment markdown ===
      cat > /tmp/pr_comment.md << 'HEADER'
      <!-- pr-summary -->
      ## PR Change Summary

      ### Production Code Changes
      HEADER

      cat >> /tmp/pr_comment.md << EOF
      | Category | Files | Lines Added | Lines Removed |
      |----------|------:|------------:|--------------:|
      | **Backend (Python)** | ${BE_PROD_FILES} | +${BE_PROD_ADD} | -${BE_PROD_DEL} |
      | **Frontend (JS/React)** | ${FE_PROD_FILES} | +${FE_PROD_ADD} | -${FE_PROD_DEL} |
      | **Total Production** | **${TOTAL_PROD_FILES}** | **+${TOTAL_PROD_ADD}** | **-${TOTAL_PROD_DEL}** |

      ### Testing Code Changes

      | Category | Files | Lines Added | Lines Removed |
      |----------|------:|------------:|--------------:|
      | Backend Unit | ${BE_TEST_UNIT_FILES} | +${BE_TEST_UNIT_ADD} | -${BE_TEST_UNIT_DEL} |
      | Backend Integration | ${BE_TEST_INT_FILES} | +${BE_TEST_INT_ADD} | -${BE_TEST_INT_DEL} |
      | Backend E2E/Sandbox | ${BE_TEST_E2E_FILES} | +${BE_TEST_E2E_ADD} | -${BE_TEST_E2E_DEL} |
      | Frontend Unit | ${FE_TEST_UNIT_FILES} | +${FE_TEST_UNIT_ADD} | -${FE_TEST_UNIT_DEL} |
      | Frontend E2E | ${FE_TEST_E2E_FILES} | +${FE_TEST_E2E_ADD} | -${FE_TEST_E2E_DEL} |
      | **Total Testing** | **${TOTAL_TEST_FILES}** | **+${TOTAL_TEST_ADD}** | **-${TOTAL_TEST_DEL}** |
      EOF

      if [ "$OTHER_FILES" -gt 0 ]; then
        cat >> /tmp/pr_comment.md << EOF

      > **Other files** (config, docs, scripts): ${OTHER_FILES} files (+${OTHER_ADD} / -${OTHER_DEL})
      EOF
      fi

      # === Coverage gap section ===
      if [ -n "$PY_COVERAGE_ROWS" ] || [ -n "$JS_COVERAGE_ROWS" ]; then
        cat >> /tmp/pr_comment.md << 'COVSECTION'

      ### Unit Test Coverage — Changed Production Files
      COVSECTION

        if [ -n "$PY_COVERAGE_ROWS" ]; then
          cat >> /tmp/pr_comment.md << EOF

      **Backend (Python)**
      | File | Line Coverage | Status |
      |------|-------------:|--------|
      ${PY_COVERAGE_ROWS}
      EOF
        fi

        if [ -n "$JS_COVERAGE_ROWS" ]; then
          cat >> /tmp/pr_comment.md << EOF

      **Frontend (JS/React)**
      | File | Line Coverage | Status |
      |------|-------------:|--------|
      ${JS_COVERAGE_ROWS}
      EOF
        fi
      fi

      cat >> /tmp/pr_comment.md << 'FOOTER'

      ---
      <sub>Generated by PR Summary workflow</sub>
      FOOTER

      # === Post or update the PR comment using marker ===
      COMMENT_ID=$(gh api "repos/visivo-io/visivo/issues/${{ init.pr-num }}/comments" \
        --jq '.[] | select(.body | contains("<!-- pr-summary -->")) | .id' 2>/dev/null | head -1)

      if [ -n "$COMMENT_ID" ]; then
        gh api "repos/visivo-io/visivo/issues/comments/${COMMENT_ID}" \
          -X PATCH \
          -F "body=@/tmp/pr_comment.md"
      else
        gh pr comment ${{ init.pr-num }} -F /tmp/pr_comment.md
      fi
    env:
      GH_TOKEN: ${{ vaults.default.github-apps.mint-automation-visivo.token }}
