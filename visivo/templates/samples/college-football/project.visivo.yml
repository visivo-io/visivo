name: College Football

models:
  - name: games
    table_name: games
    args: [cat, data/games.csv]

insights:
  - name: total_games_kpi
    props:
      type: indicator
      mode: number
      value: ?{ COUNT(${ref(games).date}) }

  - name: total_attendance_kpi
    props:
      type: indicator
      mode: number
      value: ?{ SUM(${ref(games).attendance}) / 1000.0 }
      number:
        valueformat: ".0f"
        suffix: "K"

  - name: avg_home_score
    props:
      type: bar
      x: ?{ ${ref(games).home_team} }
      y: ?{ AVG(${ref(games).home_score}) }
      marker:
        color: "#713b57"
    interactions:
      - sort: ?{ AVG(${ref(games).home_score}) DESC }

  - name: scores_by_conference
    props:
      type: box
      x: ?{ ${ref(games).conference} }
      y: ?{ ${ref(games).home_score} }
      marker:
        color: "#d25946"

  - name: attendance_by_team
    props:
      type: bar
      x: ?{ ${ref(games).home_team} }
      y: ?{ AVG(${ref(games).attendance}) }
      marker:
        color: "#4f494c"
    interactions:
      - sort: ?{ AVG(${ref(games).attendance}) DESC }

charts:
  - name: total_games_chart
    insights:
      - ${ref(total_games_kpi)}

  - name: total_attendance_chart
    insights:
      - ${ref(total_attendance_kpi)}

  - name: avg_home_score_chart
    insights:
      - ${ref(avg_home_score)}
    layout:
      title:
        text: "Average home-team score"

  - name: scores_by_conference_chart
    insights:
      - ${ref(scores_by_conference)}
    layout:
      title:
        text: "Score distribution by conference"

  - name: attendance_by_team_chart
    insights:
      - ${ref(attendance_by_team)}
    layout:
      title:
        text: "Average attendance by home team"

dashboards:
  - name: College Football
    rows:
      - height: compact
        items:
          - markdown:
              content: |
                # College Football 2024

                Selected games from the 2024 NCAA football season — scores,
                conferences, and attendance.
      - height: small
        items:
          - chart: ${ref(total_games_chart)}
          - chart: ${ref(total_attendance_chart)}
      - height: medium
        items:
          - chart: ${ref(scores_by_conference_chart)}
      - height: medium
        items:
          - chart: ${ref(avg_home_score_chart)}
          - chart: ${ref(attendance_by_team_chart)}
