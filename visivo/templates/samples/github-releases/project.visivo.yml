name: GitHub Releases

models:
  - name: releases
    table_name: releases
    args: [cat, data/releases.csv]

insights:
  - name: total_releases_kpi
    props:
      type: indicator
      mode: number
      value: ?{ COUNT(${ref(releases).version}) }
      number:
        valueformat: ","

  - name: total_downloads_kpi
    props:
      type: indicator
      mode: number
      value: ?{ SUM(${ref(releases).download_count}) }
      number:
        valueformat: ".3s"

  - name: releases_by_repo
    props:
      type: bar
      x: ?{ ${ref(releases).repo} }
      y: ?{ COUNT(${ref(releases).version}) }
      marker:
        color: "#713b57"
    interactions:
      - sort: ?{ COUNT(${ref(releases).version}) DESC }

  - name: downloads_over_time
    props:
      type: scatter
      mode: lines+markers
      x: ?{ ${ref(releases).release_date} }
      y: ?{ ${ref(releases).download_count} }
      line:
        color: "#d25946"
    interactions:
      - sort: ?{ ${ref(releases).release_date} ASC }
      - split: ?{ ${ref(releases).repo} }

  - name: avg_contributors
    props:
      type: bar
      x: ?{ ${ref(releases).repo} }
      y: ?{ AVG(${ref(releases).contributor_count}) }
      marker:
        color: "#4f494c"

charts:
  - name: total_releases_chart
    insights:
      - ${ref(total_releases_kpi)}

  - name: total_downloads_chart
    insights:
      - ${ref(total_downloads_kpi)}

  - name: releases_by_repo_chart
    insights:
      - ${ref(releases_by_repo)}
    layout:
      title:
        text: "Release count by repo"

  - name: downloads_over_time_chart
    insights:
      - ${ref(downloads_over_time)}
    layout:
      title:
        text: "Downloads per release over time"

  - name: avg_contributors_chart
    insights:
      - ${ref(avg_contributors)}
    layout:
      title:
        text: "Average contributors per release"

dashboards:
  - name: GitHub Releases
    rows:
      - height: compact
        items:
          - markdown:
              content: |
                # GitHub Releases

                Release cadence and adoption across a few popular OSS data
                repos: visivo, duckdb, dbt, sqlglot.
      - height: small
        items:
          - chart: ${ref(total_releases_chart)}
          - chart: ${ref(total_downloads_chart)}
      - height: medium
        items:
          - chart: ${ref(downloads_over_time_chart)}
      - height: medium
        items:
          - chart: ${ref(releases_by_repo_chart)}
          - chart: ${ref(avg_contributors_chart)}
