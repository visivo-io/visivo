models:
  - name: aapl-stock-price
    table_name: aapl_stock_price
    args:
      - cat
      - data/aapl-stock-price.csv

insights:
  - name: aapl-candlestick
    props:
      type: candlestick
      x: ?{${ref(aapl-stock-price).date}}
      open: ?{cast(${ref(aapl-stock-price).open} as float)}
      high: ?{cast(${ref(aapl-stock-price).high} as float)}
      low: ?{cast(${ref(aapl-stock-price).low} as float)}
      close: ?{cast(${ref(aapl-stock-price).close} as float)}
    interactions:
      - sort: ?{${ref(aapl-stock-price).date} DESC}

  - name: max-price
    props:
      type: indicator
      value: ?{max(cast(${ref(aapl-stock-price).high} as float))}[0]

  - name: min-price
    props:
      type: indicator
      value: ?{min(cast(${ref(aapl-stock-price).high} as float))}[0]

charts:
  - name: aapl-stock-price-chart
    insights:
      - ${ref(aapl-candlestick)}
      - ${ref(max-price)}
    layout:
      title:
        text: "Apple Stock Price"

  - name: max-price-chart
    insights:
      - ${ref(max-price)}
    layout:
      title:
        text: "52 Week High"

  - name: min-price-chart
    insights:
      - ${ref(min-price)}
    layout:
      title:
        text: "52 Week Low"

tables:
  - name: aapl-stock-price-table
    data: ${ref(aapl-candlestick)}

dashboards:
  - name: "Apple Stock Analysis"
    rows:
      - height: small
        items:
          - width: 1
            chart: ${ref(max-price-chart)}
          - width: 1
            chart: ${ref(min-price-chart)}
      - height: large
        items:
          - chart: ${ref(aapl-stock-price-chart)}
      - height: large
        items:
          - table: ${ref(aapl-stock-price-table)}
