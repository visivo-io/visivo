name: homepage-assets
defaults:
  source_name: Example Target
includes:
  # - path: visivo-io/visivo.git@main -- test-projects/demo/dashboards/welcome.visivo.yml
  - path: ./aapl-stock.visivo.yml
alerts: []
sources:
  - name: Example Target
    database: local.db
    type: sqlite
models:
  - name: Example Model
    sql: select * from test_table
insights: []
tables: []
charts: []
dashboards:
  - name: Example Dashboard
    rows:
      - height: medium
        items:
          - width: 1
            chart:
              name: Example Chart
              insights:
                - name: Example Trace
                  props:
                    type: scatter
                    x: ?{${ref(Example Model).x}}
                    y: ?{${ref(Example Model).y}}
