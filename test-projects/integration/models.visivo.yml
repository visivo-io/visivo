relations:
  - name: local_to_local
    condition: ${ref(local_test_table).x} = ${ref(another_local_test_table).x}

metrics:
  - name: composite_metric
    expression: ${ref(local_test_table).x_sum} + ${ref(another_local_test_table).new_y_sum}

sources:
  - name: csv-source
    type: duckdb
    database: target/seeds/csv.duckdb
    seeds:
      - table_name: csv
        args:
          - echo
          - |-
            x,y
            1,9
            2,1
            3,2
            4,3
            5,5
            6,8

  - name: markdown-table-base-source
    type: duckdb
    database: target/seeds/markdown_table_base.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            vanilla_text,markdown
            plain,plain
            **bold**,**bold**
            <ins>[link](https://visivo.io/)</ins>,<ins>[link](https://visivo.io/)</ins>
            # header,# header

  - name: processes-source
    type: duckdb
    database: target/seeds/processes.duckdb
    seeds:
      - table_name: processes
        args:
          - python
          - create_processes_csv.py
          - "&&"
          - cat target/processes.csv

  - name: waterfall_model-source
    type: duckdb
    database: target/seeds/waterfall_model.duckdb
    seeds:
      - table_name: appl_pl
        args:
          - cat
          - data/aapl_pl.csv

models:
  - name: local_test_table
    sql: "SELECT * FROM test_table"
    metrics:
      - name: x_sum
        expression: "SUM(x)"
    dimensions:
      - name: x_rounded
        expression: "ROUND(x, 2)"
  - name: another_local_test_table
    sql: "SELECT x*y+y as new_x, y*x as new_y, x FROM test_table"
    metrics:
      - name: new_y_sum
        expression: "SUM(new_y)"
    dimensions:
      - name: new_x_rounded
        expression: "ROUND(new_x, 2)"
  - name: second_local_test_table
    sql: "SELECT * FROM second_test_table"
  # Was a LocalMergeModel, which always executed its join in DuckDB regardless of
  # the run's default source. Pin it to local-duckdb so that behaviour is
  # preserved and the join stays dialect-safe across every backend the suite runs
  # against (ClickHouse, in particular, rejects this join on the default source).
  # test_table + second_test_table both live in the local duckdb.
  - name: join_table
    source: ${ref(local-duckdb)}
    sql: |
      SELECT ltt.x, sltt.y FROM test_table AS ltt
        JOIN second_test_table AS sltt
        ON ltt.x = sltt.x
  - name: csv
    source: ${ref(csv-source)}
    sql: select * from csv
  - name: markdown-table-base
    source: ${ref(markdown-table-base-source)}
    sql: select * from model
  - name: processes
    source: ${ref(processes-source)}
    sql: select * from processes
  - name: waterfall_model
    source: ${ref(waterfall_model-source)}
    sql: select * from appl_pl
  # Date-based model for testing date inputs and expressions
  - name: daily_metrics_embedded
    source:
      type: duckdb
      database: test.duckdb
    sql: |
      SELECT
        date_trunc('day', TIMESTAMP '2024-01-01' + INTERVAL (x) DAY) AS date,
        x as day_num,
        y as value,
        CASE 
          WHEN x % 4 = 0 THEN 'Category A'
          WHEN x % 3 = 0 THEN 'Category B'
          WHEN x % 2 = 0 THEN 'Category C'
          ELSE 'Category D' 
        END as category
      FROM test_table
      WHERE x <= 30
  - name: daily_metrics
    source: ${ref(local-duckdb)}
    sql: |
      SELECT
        date_trunc('day', TIMESTAMP '2024-01-01' + INTERVAL (x) DAY) AS date,
        x as day_num,
        y as value,
        CASE 
          WHEN x % 4 = 0 THEN 'Category A'
          WHEN x % 3 = 0 THEN 'Category B'
          WHEN x % 2 = 0 THEN 'Category C'
          ELSE 'Category D' 
        END as category
      FROM test_table
      WHERE x <= 30
    dimensions:
      - name: formatted_date
        expression: "strftime(date, '%Y-%m-%d')"
    metrics:
      - name: total_value
        expression: "Count(value)"
      - name: avg_value
        expression: "AVG(value)"

  - name: sales_data
    source: ${ref(local-duckdb)}
    sql: |
      SELECT
        (['North','South','East','West'])[1 + (i % 4)] AS region,
        (['Electronics','Clothing','Food','Furniture','Books'])[1 + ((i // 4) % 5)] AS category,
        (['Q1','Q2','Q3','Q4'])[1 + ((i // 20) % 4)] AS quarter,
        (['Online','Store','Wholesale'])[1 + (i % 3)] AS channel,
        ROUND(50 + (i * 17 % 200) + (i * 7 % 50), 2) AS revenue,
        CAST((i * 3 % 40) + 5 AS INTEGER) AS units_sold,
        ROUND(10 + (i * 13 % 30) + ((i * 7 % 20) * 0.5), 2) AS cost
      FROM generate_series(0, 99) AS t(i)

  - name: nested-and-name
    sql: "SELECT x, y*3 as y FROM test_table"

  # Wide-columns model used by the table-width-overflow E2E story.
  # 12 columns with deliberately long display names (>= 25 chars each)
  # so the natural totalWidth from `calculateColumnWidth` (~250px each)
  # exceeds any reasonable viewport. This forces the wide-table fix paths:
  # - dashboard grid track must not expand past the viewport
  # - DataTable's inner overflow-auto must scroll horizontally
  # - DataTableHeader must wrap to 2 lines under compression
  - name: wide-columns-table
    source: ${ref(local-duckdb)}
    sql: |
      SELECT
        i AS id_column,
        'row ' || i AS canceled_and_completed_deal_revenue,
        i * 10 AS month_to_date_revenue_goal_value,
        i * 11 AS opened_files_to_date_count_total,
        i * 12 AS month_to_date_opened_files_goal,
        i * 13 AS canceled_orders_running_count,
        i * 14 AS month_to_date_canceled_files_goal,
        i * 15 AS closed_deals_goal_running_total,
        i * 16 AS revenue_goal_month_to_date_value,
        i * 17 AS canceled_deals_goal_running_total,
        i * 18 AS opened_files_goal_month_to_date,
        i * 19 AS pipeline_value_running_total
      FROM generate_series(1, 5) AS t(i)
