path: project
name: duckdb-concurrency
defaults:
  source_name: Example Source
includes: []
destinations: []
alerts: []
sources:
  - name: Example Source
    database: local.db
    type: duckdb

models:
  - name: duck-db-model
    sql: select * from test_table
  - name: Example Model
    sql: select * from test_table

insights:
  #{% for i in range(100) %}
  - name: "trace-{{i}}"
    props:
      type: bar
      x: ?{${ref(duck-db-model).x}*{{i}}}
      y: ?{${ref(duck-db-model).y}*{{i}}}
  #{% endfor %}
tables: []
charts: []
selectors: []
dashboards:
  - name: Example Dashboard
    rows:
      - height: medium
        items:
          - width: 1
            chart:
              name: Example Chart
              insights:
                - name: Example Trace
                  props:
                    type: scatter
                    x: ?{${ref(Example Model).x}}
                    y: ?{${ref(Example Model).y}}
