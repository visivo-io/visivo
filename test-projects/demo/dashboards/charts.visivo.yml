dashboards:
  - name: Chart Examples
    rows:
      - height: small
        items:
          - markdown: |
              # Chart Examples

              This dashboard contains example on some common chart types.

      - height: medium
        items:
          - markdown: |
              # Bar
          - chart:
              name: Bar Chart
              insights:
                - name: Simple Bar
                  props:
                    type: bar
                    x: ?{${ref(Echo CSV).x}}
                    y: ?{${ref(Echo CSV).y}}
