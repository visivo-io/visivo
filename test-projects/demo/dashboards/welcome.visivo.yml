models:
  - name: Waterfall Model
    table_name: appl_pl
    args:
      - curl
      - -s
      - https://raw.githubusercontent.com/visivo-io/visivo/main/test-projects/integration/data/aapl_pl.csv

insights:
  - name: Fibonacci Waterfall Trace
    props:
      type: waterfall
      base: 0
      measure: ?{${ref(Waterfall Model).waterfall}}
      x: ?{${ref(Waterfall Model).category}}
      y: ?{try_cast( replace(${ref(Waterfall Model).thousands_dollars}, ',', '') as float ) * try_cast(${ref(Waterfall Model).sign} as float)}
      text: ?{ cast(${ref(Waterfall Model).thousands_dollars} as text) }
      increasing:
        marker:
          color: "#b97a9b"
      decreasing:
        marker:
          color: "#edbdb5"
    interactions:
      - split: ?{${ref(Waterfall Model).year}}
      - sort: ?{${ref(Waterfall Model).row} ASC}
      - filter: ?{ ${ref(Waterfall Model).waterfall} is not null }
      - filter: ?{ ${ref(Waterfall Model).category} not in ('Earnings From Continuing Operations') }
      - filter: ?{ ${ref(Waterfall Model).year} in ('Sep 2023', 'Sep 2022') }

dashboards:
  - name: Welcome to Visivo
    rows:
      - height: compact
        items:
          - markdown: |
              # Welcome to Visivo

              #### This is a demo dashboard that contains some simple examples of common use cases.

              These words were created using _markdown_ inside the dashboard directly and can be added to help your users understand the data they are looking at!
      - height: medium
        items:
          - markdown: |
              ### There are tons of different chart options to display your data.

              Each [Chart](https://docs.visivo.io/reference/configuration/Chart/), can have many lines.  Each line is called an [Insight](https://docs.visivo.io/reference/configuration/Insight/).  Here is one with a [Waterfall Insight](https://docs.visivo.io/reference/configuration/Insight/Waterfall/).

              Some common options are:
              1. [Scatter (line)](https://docs.visivo.io/reference/configuration/Insight/Scatter/)
              1. [Bar](https://docs.visivo.io/reference/configuration/Insight/Bar/)
              1. [Indicator](https://docs.visivo.io/reference/configuration/Insight/Indicator/)

          - width: 2
            chart:
              name: Fibonacci Waterfall Chart
              selector: ${ref(Fibonacci Waterfall Selector)}
              insights:
                - ${ref(Fibonacci Waterfall Trace)}
      - height: medium
        items:
          - markdown: |
              ### You can also display your data in a [Table](https://docs.visivo.io/reference/configuration/Table/)!

              This is a useful way to break out your data for analysis.
          - width: 2
            table:
              name: Fibonacci Waterfall Table
              selector: ${ref(Fibonacci Waterfall Selector)}
              data: ${ref(Fibonacci Waterfall Trace)}
              column_defs:
                - insight_name: Fibonacci Waterfall Trace
                  columns:
                    - header: Widget Type
                      key: props.x
                    - header: Widget Sales
                      key: props.y
                    - header: Dollars
                      key: props.text
      - height: small
        items:
          - width: 2
            markdown: |
              ### Link your charts and tables together

              A _selector_ allows you define which data is shown.  Change this selector and watch the table and chart above change.

          - selector:
              name: Fibonacci Waterfall Selector
              type: single
              options:
                - ${ref(Fibonacci Waterfall Trace)}
