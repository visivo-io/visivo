    

charts:
  - name: import_percentages
    insights:
      - ${ref(percent_imports)}
    layout:
      title: 
        text: "Imports by Country"
  - name: export_percentages
    insights:
      - ${ref(percent_exports)}
    layout:
      title: 
        text: "Exports by Country"
  - name: importers
    insights:
      - ${ref(top_importers)}
      - ${ref(total_import_production)}
    layout:
      title: 
        text: "Imports"
      xaxis:
        title:
          text: "Year"
      yaxis:
        title: 
          text: "Kilograms"
      yaxis2:
        title: 
          text: 'Total'
        tickfont:
          color: 'rgb(148, 103, 189)'
        overlaying: 'y'
        side: 'right'
      legend:
        x: 0.01
        y: 1.12
        orientation: h
        xanchor: left
        yanchor: top
  
  - name: exporters
    insights:
      - ${ref(top_exporters)}
      - ${ref(total_export_production)}
    layout:
      title: 
        text: "Exports"
      xaxis:
        title: 
          text: "Year"
      yaxis:
        title: 
          text: "Kilograms"
      yaxis2:
        title: 
          text: 'Total'
        tickfont:
          color: 'rgb(148, 103, 189)'
        overlaying: 'y'
        side: 'right'
      legend:
        x: 0.3
        y: 1.12
        orientation: h
        xanchor: left
        yanchor: top
