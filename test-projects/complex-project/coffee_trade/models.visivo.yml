  - name: exports
    models:
      - ${ref(coffee_export_raw)}
    sql: |
      with
      base as (
        SELECT
          country,
          total_export,
          (year || '-01-01')::date as year,
          kilograms,
          SUM(kilograms) OVER(PARTITION BY country) as total_kilograms,
          SUM(kilograms) OVER() as total_kg_all_countries
        FROM coffee_export_raw.coffee_export
      )
      SELECT
        *,
        CASE
          WHEN DENSE_RANK() OVER(ORDER BY total_kilograms desc) <= 10
            THEN country
          ELSE 'Everyone Else'
        END as top_countries,
        CASE
          WHEN DENSE_RANK() OVER(ORDER BY total_kilograms desc) <= 15
            THEN round((total_kilograms / total_kg_all_countries)*100, 2) || ' %'
          ELSE ''
        END as top_countries_perc
      FROM base

  - name: imports
    models:
      - ${ref(coffee_import_raw)}
    sql: |
      with
      base as (
        SELECT
          country,
          total_import,
          (year || '-01-01')::date as year,
          kilograms,
          SUM(kilograms) OVER(PARTITION BY country) as total_kilograms,
          SUM(kilograms) OVER() as total_kg_all_countries
        FROM coffee_import_raw.coffee_import
      )
      SELECT
        *,
        CASE
          WHEN DENSE_RANK() OVER(ORDER BY total_kilograms desc) <= 10
            THEN country
          ELSE 'Everyone Else'
        END as top_countries,
        CASE
          WHEN DENSE_RANK() OVER(ORDER BY total_kilograms desc) <= 15
            THEN round((total_kilograms / total_kg_all_countries)*100, 2) || ' %'
          ELSE ''
        END as top_countries_perc
      FROM base
