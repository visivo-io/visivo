includes:
  - path: "simple.visivo.yml"
  - path: "filled-contour.visivo.yml"
  - path: "multi-level-contour.visivo.yml"

dashboards:
  - name: contour
    level: 1
    tags:
      - "Trace Prop"
    rows:
      - height: compact
        items:
          - markdown:
              content: "# Contour"
          - markdown:
              content: ""
            width: 5
      - height: medium
        items:
          - chart: ${ref(simple-contour-chart)}
          - chart: ${ref(filled-contour-chart)}
      - height: medium
        items:
          - chart: ${ref(contour-chart-with-multiple-levels)}
          - markdown:
              content: ""