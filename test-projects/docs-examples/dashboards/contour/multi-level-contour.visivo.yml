models:
  - name: contour-data-multi
    args:
      - echo
      - |
        x,y,z
        -2,-2,0
        -1,-2,1
        0,-2,2
        1,-2,3
        2,-2,4
        -2,-1,1
        -1,-1,2
        0,-1,3
        1,-1,4
        2,-1,5
        -2,0,2
        -1,0,3
        0,0,4
        1,0,5
        2,0,6
charts:
  - name: contour-chart-with-multiple-levels
    layout:
      title:
        text: Contour Plot with Multiple Levels<br><sub>Custom Contour Levels</sub>
      xaxis:
        title:
          text: "X Axis"
      yaxis:
        title:
          text: "Y Axis"
    insights:
      - ${ref(contour-plot-with-multiple-levels)}
insights:
  - name: contour-plot-with-multiple-levels
    props:
      type: contour
      x: ?{${ref(contour-data-multi).x}}
      y: ?{${ref(contour-data-multi).y}}
      z: ?{${ref(contour-data-multi).z}}
      colorscale: "Jet"
      contours:
        start: 0
        end: 6
        size: 1
