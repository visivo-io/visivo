models:
  - name: volume-data
    args:
      - echo
      - |
        idx,x,y,z,value
        0,0,0,1,1
        1,0,1,1,2
        2,0,0,0,3
        3,0,1,0,4
        4,1,0,1,5
        5,1,1,1,6
        6,1,0,0,7
        7,1,1,0,8
charts:
  - name: simple-volume-chart
    layout:
      title:
        text: Simple Volume Plot<br><sub>3D Volumetric Data</sub>
    insights:
      - ${ref(simple-volume-plot)}
insights:
  - name: simple-volume-plot
    props:
      type: volume
      x: ?{${ref(volume-data).x}}
      y: ?{${ref(volume-data).y}}
      z: ?{${ref(volume-data).z}}
      value: ?{${ref(volume-data).value}}
    interactions:
      - sort: ?{ ${ref(volume-data).idx} ASC}
