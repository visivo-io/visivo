models:
  - name: heatmap-data
    args:
      - echo
      - |
        x,y,z
        A,1,5
        A,2,10
        A,3,15
        B,1,20
        B,2,25
        B,3,30
        C,1,35
        C,2,40
        C,3,45
charts:
  - name: simple-heatmap-chart
    layout:
      title:
        text: Simple Heatmap Plot<br><sub>Data Visualization on a 2D Grid</sub>
      xaxis:
        title:
          text: "X Axis"
      yaxis:
        title:
          text: "Y Axis"
    insights:
      - ${ref(simple-heatmap-plot)}
insights:
  - name: simple-heatmap-plot
    props:
      type: heatmap
      x: ?{${ref(heatmap-data).x}}
      y: ?{${ref(heatmap-data).y}}
      z: ?{${ref(heatmap-data).z}}
      colorscale: "Viridis"
