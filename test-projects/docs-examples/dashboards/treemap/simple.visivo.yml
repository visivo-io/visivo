sources:
  - name: treemap-data-source
    type: duckdb
    database: target/seeds/treemap_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            labels,parents,values
            Total,,100
            A,Total,40
            B,Total,30
            C,Total,30
            D,A,10
            E,A,20
            F,B,10
models:
  - name: treemap-data
    source: ${ref(treemap-data-source)}
    sql: select * from model
charts:
  - name: simple-treemap-chart
    layout:
      title:
        text: Simple Treemap Chart<br><sub>Hierarchical Data Visualization</sub>
    insights:
      - ${ref(simple-treemap-plot)}
insights:
  - name: simple-treemap-plot
    props:
      type: treemap
      labels: ?{${ref(treemap-data).labels}}
      parents: ?{${ref(treemap-data).parents}}
      values: ?{"values"}
      marker:
        colorscale: Blackbody
      textposition: "middle center"
      texttemplate: "<b>%{label}</b>"
      textfont:
        size: 12
