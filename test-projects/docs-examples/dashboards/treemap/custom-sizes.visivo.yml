models:
  - name: treemap-data-tiling
    args:
      - echo
      - |
        labels,parents,values
        Total,,100
        A,Total,40
        B,Total,30
        C,Total,30
        D,A,15
        E,A,25
        F,B,10
        G,B,20
        H,C,15
        I,C,15
charts:
  - name: treemap-chart-with-custom-tiling
    layout:
      title:
        text: Treemap Plot with Custom Tiling<br><sub>Binary Packing and Custom Squarify Ratio</sub>
    insights:
      - ${ref(treemap-plot-with-custom-tiling)}
insights:
  - name: treemap-plot-with-custom-tiling
    props:
      type: treemap
      labels: ?{${ref(treemap-data-tiling).labels}}
      parents: ?{${ref(treemap-data-tiling).parents}}
      values: ?{"values"}
      tiling:
        packing: binary
        squarifyratio: 1.5
