models:
  - name: treemap-data-colors
    args:
      - echo
      - |
        labels,parents,values,colors
        Total,,100,#1f77b4
        A,Total,40,#ff7f0e
        B,Total,30,#2ca02c
        C,Total,30,#d62728
        D,A,10,#9467bd
        E,A,20,#8c564b
        F,B,10,#e377c2
charts:
  - name: treemap-chart-with-custom-colors
    layout:
      title:
        text: Treemap Plot with Custom Colors<br><sub>Custom Colors for Each Category</sub>
    insights:
      - ${ref(treemap-plot-with-custom-colors)}
insights:
  - name: treemap-plot-with-custom-colors
    props:
      type: treemap
      labels: ?{${ref(treemap-data-colors).labels}}
      parents: ?{${ref(treemap-data-colors).parents}}
      values: ?{"values"}
      marker:
        colors: ?{${ref(treemap-data-colors).colors}}
        line:
          color: black
