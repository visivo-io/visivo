includes:
  - path: "simple.visivo.yml"
  - path: "custom-colors.visivo.yml"
  - path: "custom-sizes.visivo.yml"

dashboards:
  - name: treemap
    level: 1
    tags:
      - "Trace Prop"
    rows:
      - height: compact
        items:
          - markdown:
              content: "# Treemap"
          - markdown:
              content: ""
            width: 5
      - height: large
        items:
          - chart: ${ref(simple-treemap-chart)}
          - chart: ${ref(treemap-chart-with-custom-colors)}
      - height: large
        items:
          - chart: ${ref(treemap-chart-with-custom-tiling)}
          - markdown:
              content: ""