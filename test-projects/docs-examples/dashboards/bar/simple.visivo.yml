sources:
  - name: monty-python-quests-source-2
    type: duckdb
    database: target/seeds/monty_python_quests.duckdb
    seeds:
      - table_name: model
        args:
          - curl
          - "s"
          - "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/monty_python_quests.csv"
models:
  - name: monty-python-quests
    source: ${ref(monty-python-quests-source-2)}
    sql: select * from model
charts:
  - name: count-times-enemy-was-encountered
    layout:
      title:
        text: Simple Bar<br><sub>The Number of Times an Enemy was Enountered on a Quest</sub>
    insights:
      - ${ref(count-enemy-encountered)}
insights:
  - name: count-enemy-encountered
    props:
      type: bar
      x: ?{${ref(monty-python-quests).enemy_encountered}}
      y: ?{ count(*) }
      text: ?{ count(*) }
    interactions:
      - sort: ?{ count(*) DESC}
