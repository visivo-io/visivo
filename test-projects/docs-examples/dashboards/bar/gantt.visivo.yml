sources:
  - name: projects-gantt-source
    type: duckdb
    database: target/seeds/projects_gantt.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            project,start_date,finish_date
            Website Speed,2024-02-14,2024-03-07
            Database Migration,2024-02-22,2024-03-05
            Bug Fix,2024-02-12,2024-02-18

models:
  - name: projects-gantt
    source: ${ref(projects-gantt-source)}
    sql: select * from model
insights:
  - name: bar-project-durations
    props:
      type: bar
      x: ?{${ref(projects-gantt)}.finish_date }
      y: ?{${ref(projects-gantt)}.project}
      orientation: h
      base: ?{start_date}
    interactions:
      - sort: ?{${ref(projects-gantt)}.project ASC}

charts:
  - name: project-durations-gantt-chart
    layout:
      title:
        text: Project Duration Gantt Chart<br><sub>Visualizing the duration of each project over time</sub>
      barmode: overlay
      margin:
        l: 130
      showlegend: false
    insights:
      - ${ref(bar-project-durations)}
