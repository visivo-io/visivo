models:
  - name: violin-data-split
    args:
      - echo
      - |
        category,sub_category,value
        A,X,23
        A,Y,25
        A,Y,70
        A,Y,15
        A,X,27
        A,X,13
        A,X,21
        A,X,81
        B,X,30
        B,X,35
        B,X,4
        B,Y,35
        B,Y,6
        B,Y,5
        B,X,28
charts:
  - name: Violin Chart with Split Categories
    layout:
      title:
        text: Violin Plot with Split Categories<br><sub>Split Violin Plot for Different Subcategories</sub>
    insights:
      - ${ref(Violin Plot Category Y)}
      - ${ref(Violin Plot Category X)}
insights:
  - name: Violin Plot Category X
    props:
      type: violin
      side: positive
      x: ?{${ref(violin-data-split).category}}
      y: ?{${ref(violin-data-split).value}}
    interactions:
      - split: ?{${ref(violin-data-split).sub_category}}
      - filter: ?{ ${ref(violin-data-split).sub_category} = 'X'}
  - name: Violin Plot Category Y
    props:
      type: violin
      side: negative
      x: ?{${ref(violin-data-split).category}}
      y: ?{${ref(violin-data-split).value}}
    interactions:
      - split: ?{${ref(violin-data-split).sub_category}}
      - filter: ?{ ${ref(violin-data-split).sub_category} = 'Y'}
