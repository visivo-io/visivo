models:
  - name: violin-data
    args:
      - echo
      - |
        category,value
        A,23
        A,25
        A,27
        B,30
        B,35
        B,28
charts:
  - name: Simple Violin Chart
    layout:
      title:
        text: Simple Violin Plot<br><sub>Distribution of Values by Category</sub>
    insights:
      - ${ref(Simple Violin Plot)}
insights:
  - name: Simple Violin Plot
    props:
      type: violin
      x: ?{${ref(violin-data).category}}
      y: ?{${ref(violin-data).value}}
