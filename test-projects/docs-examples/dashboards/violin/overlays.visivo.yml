sources:
  - name: violin-data-box-source
    type: duckdb
    database: target/seeds/violin_data_box.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            category,value
            A,23
            A,25
            A,27
            B,30
            B,35
            B,28
models:
  - name: violin-data-box
    source: ${ref(violin-data-box-source)}
    sql: select * from model
charts:
  - name: violin-chart-with-box
    layout:
      title:
        text: Horizontal Violin Plot with Box & Points<br><sub>Overlay a Box Plot and Points</sub>
    insights:
      - ${ref(violin-plot-with-box)}
insights:
  - name: violin-plot-with-box
    props:
      type: violin
      y: ?{${ref(violin-data-box).category}}
      x: ?{${ref(violin-data-box).value}}
      orientation: h
      box:
        visible: true
      points: "all"
      marker:
        symbol: "cross-dot"
    interactions:
      - split: ?{${ref(violin-data-box).category}}
