models:
  - name: wind-data-cone
    args:
      - echo
      - |
        x,y,z,u,v,w,speed
        0,0,0,5,5,0,7.07
        2,2,1,-5,5,0,7.07
        4,4,3,-5,-5,0,7.07
        6,6,5,5,-5,0,7.07
        8,8,8,0,0,5,5.00

charts:
  - name: Wind Direction Cone Plot
    layout:
      title:
        text: Wind Direction and Speed
      scene:
        camera:
          eye:
            x: 1.5
            y: -0.5
            z: 1
      margin:
        l: 90
        r: 0
        t: 40
        b: 90
    insights:
      - ${ref(Wind Direction Cone Plot Trace)}
insights:
  - name: Wind Direction Cone Plot Trace
    props:
      type: cone
      x: ?{${ref(wind-data-cone).x}}
      y: ?{${ref(wind-data-cone).y}}
      z: ?{${ref(wind-data-cone).z}}
      u: ?{${ref(wind-data-cone).u}}
      v: ?{${ref(wind-data-cone).v}}
      w: ?{${ref(wind-data-cone).w}}
      colorscale: "Viridis"
      colorbar:
        title:
          text: "Wind Speed (m/s)"
      hoverinfo: "text"
      text: ?{${ref(wind-data-cone).speed}}

