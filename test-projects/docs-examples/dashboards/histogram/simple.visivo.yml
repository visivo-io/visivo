models:
  - name: histogram-data
    args:
      - echo
      - |
        value
        10
        20
        15
        10
        5
        25
        30
        15
        20
        10
charts:
  - name: simple-histogram-chart
    layout:
      title:
        text: Simple Histogram Plot<br><sub>Data Distribution Across Bins</sub>
      xaxis:
        title:
          text: "Value"
      yaxis:
        title:
          text: "Count"
      bargap: 0.05
    insights:
      - ${ref(simple-histogram-plot)}
insights:
  - name: simple-histogram-plot
    props:
      type: histogram
      x: ?{${ref(histogram-data).value}}
      nbinsx: 5
      marker:
        color: "#17becf"
