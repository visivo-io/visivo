includes:
  - path: "simple.visivo.yml"
  - path: "horizontal.visivo.yml"
  - path: "stacked.visivo.yml"

dashboards:
  - name: histogram
    level: 1
    tags:
      - "Trace Prop"
    rows:
      - height: compact
        items:
          - markdown:
              content: "# Histogram"
          - markdown:
              content: ""
            width: 5
      - height: medium
        items:
          - chart: ${ref(simple-histogram-chart)}
          - chart: ${ref(horizontal-histogram-chart)}
      - height: medium
        items:
          - chart: ${ref(stacked-histogram-chart)}
          - markdown:
              content: ""