charts:
  - name: Horizontal Histogram Chart
    layout:
      title:
        text: Horizontal Histogram Plot<br><sub>Data Distribution in a Horizontal Format</sub>
      yaxis:
        title:
          text: "Value"
      xaxis:
        title:
          text: "Count"
      bargap: 0.05
    insights:
      - ${ref(Horizontal Histogram Plot)}
insights:
  - name: Horizontal Histogram Plot
    props:
      type: histogram
      y: ?{${ref(histogram-data-horizontal).value}}
      nbinsy: 2
      marker:
        color: "#ff7f0e"
      orientation: h
