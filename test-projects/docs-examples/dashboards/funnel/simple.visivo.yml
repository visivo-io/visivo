sources:
  - name: funnel-data-source
    type: duckdb
    database: target/seeds/funnel_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            stage,value
            Leads,1000
            Qualified Leads,750
            Opportunities,400
            Proposals,200
            Closed Deals,100
models:
  - name: funnel-data
    source: ${ref(funnel-data-source)}
    sql: select * from model
charts:
  - name: simple-funnel-chart
    layout:
      title:
        text: Simple Funnel Chart<br><sub>Sales Funnel from Leads to Closed Deals</sub>
      xaxis:
        title:
          text: "Stage"
      margin:
        l: 100
    insights:
      - ${ref(simple-funnel-plot)}
insights:
  - name: simple-funnel-plot
    props:
      type: funnel
      y: ?{${ref(funnel-data).stage}}
      x: ?{${ref(funnel-data).value}}
      textinfo: "value+percent previous"
      marker:
        color: "#17becf"
    interactions:
      - sort: ?{${ref(funnel-data).value} DESC}
