models:
  - name: funnel-data-horizontal
    args:
      - echo
      - |
        stage,value
        Awareness,5000
        Interest,3000
        Consideration,1500
        Conversion,700
charts:
  - name: horizontal-funnel-chart
    layout:
      title:
        text: Horizontal Funnel Chart<br><sub>Stages of User Journey</sub>
      xaxis:
        title:
          text: "Stage"
    insights:
      - ${ref(horizontal-funnel-chart-trace)}
insights:
  - name: horizontal-funnel-chart-trace
    props:
      type: funnel
      orientation: v
      x: ?{${ref(funnel-data-horizontal).stage}}
      y: ?{${ref(funnel-data-horizontal).value}}
      marker:
        color: "#ff7f0e"
    interactions:
      - sort: ?{${ref(funnel-data-horizontal).value} DESC}
