models:
  - name: funnel-data-custom
    args:
      - echo
      - |
        stage,value,color
        Leads,1200,"#1f77b4"
        MQL,900,"#ff7f0e"
        SQL,600,"#2ca02c"
        Proposal,300,"#d62728"
        Won,100,"#9467bd"
charts:
  - name: Funnel Chart with Custom Markers
    layout:
      title:
        text: Funnel Chart with Custom Markers<br><sub>Stages of the Sales Funnel</sub>
      xaxis:
        title:
          text: "Stage"
    insights:
      - ${ref(Custom Markers Funnel Chart)}
insights:
  - name: Custom Markers Funnel Chart
    props:
      type: funnel
      y: ?{${ref(funnel-data-custom).stage}}
      x: ?{${ref(funnel-data-custom).value}}
      marker:
        color: ?{${ref(funnel-data-custom).color}}
      textinfo: "value+percent total"
      orientation: h
    interactions:
      - sort: ?{${ref(funnel-data-custom).value} DESC}
