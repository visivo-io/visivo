sources:
  - name: splom-data-sizes-source
    type: duckdb
    database: target/seeds/splom_data_sizes.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            var1,var2,var3,size
            1,2,3,10
            2,3,4,15
            3,4,5,20
            4,5,6,25
            5,6,7,30
models:
  - name: splom-data-sizes
    source: ${ref(splom-data-sizes-source)}
    sql: select * from model
charts:
  - name: splom-chart-with-custom-sizes
    layout:
      title:
        text: Splom Plot with Custom Sizes<br><sub>Scatter Plot Matrix with Custom Marker Sizes</sub>
    insights:
      - ${ref(splom-plot-with-custom-sizes)}
insights:
  - name: splom-plot-with-custom-sizes
    props:
      type: splom
      dimensions:
        - label: "Variable 1"
          values: ?{${ref(splom-data-sizes).var1}}
        - label: "Variable 2"
          values: ?{${ref(splom-data-sizes).var2}}
        - label: "Variable 3"
          values: ?{${ref(splom-data-sizes).var3}}
      marker:
        size: ?{${ref(splom-data-sizes).size}}
