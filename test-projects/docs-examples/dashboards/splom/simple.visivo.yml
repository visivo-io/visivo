sources:
  - name: splom-data-source
    type: duckdb
    database: target/seeds/splom_data.duckdb
    seeds:
      - table_name: model
        args:
          - curl
          - "-s"
          - "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/iris.csv"
models:
  - name: splom-data
    source: ${ref(splom-data-source)}
    sql: select * from model
charts:
  - name: simple-splom-chart
    layout:
      title:
        text: Simple Splom Plot<br><sub>Scatter Plot Matrix of Four Variables & Three Cohorts</sub>
    insights:
      - ${ref(simple-splom-plot)}
insights:
  - name: simple-splom-plot
    props:
      type: splom
      dimensions:
        - label: "Sepal Length"
          values: ?{${ref(splom-data).sepal_length}}
        - label: "Sepal Width"
          values: ?{${ref(splom-data).sepal_width}}
        - label: "Petal Length"
          values: ?{${ref(splom-data).petal_length}}
        - label: "Petal Width"
          values: ?{${ref(splom-data).petal_width}}
      diagonal:
        visible: false
      showupperhalf: false

    interactions:
      - split: ?{${ref(splom-data).species}}
