sources:
  - name: numbers-from-remote-csv-source
    type: duckdb
    database: target/seeds/numbers_from_remote_csv.duckdb
    seeds:
      - table_name: model
        args: ["curl", "-s", "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/y_values.csv"]
models:
  - name: numbers-from-remote-csv
    source: ${ref(numbers-from-remote-csv-source)}
    sql: select * from model

charts:
  - name: big-number-over-line-chart
    layout:
      title:
        text: "Indicator + Scatter Plot"
    insights:
      - ${ref(average-value)}
      - ${ref(total-value)}
      - ${ref(line-trace)}
insights:
  - name: line-trace
    props:
      type: scatter
      y: ?{${ref(numbers-from-remote-csv).numbers_column}}
      line:
        shape: spline
        color: orange

  - name: average-value
    props:
      type: indicator
      value: ?{avg(${ref(numbers-from-remote-csv).numbers_column})}[0]
      number:
        font:
          size: 35
        suffix: " avg"
      domain:
        y: [0, .7]
        x: [.5, 1]
  - name: total-value
    props:
      type: indicator
      value: ?{sum(${ref(numbers-from-remote-csv).numbers_column})}[0]
      number:
        font:
          size: 35
        suffix: " sum"
      domain:
        y: [.5, 1]
        x: [.2, .5]
