models:
  - name: Numbers From Remote CSV
    args: ["curl", "-s", "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/y_values.csv"]

charts:
  - name: Big Number Over Line Chart
    layout:
      title:
        text: "Indicator + Scatter Plot"
    insights:
      - ${ref(Average Value)}
      - ${ref(Total Value)}
      - ${ref(Line Trace)}
insights:
  - name: Line Trace
    props:
      type: scatter
      y: ?{${ref(Numbers From Remote CSV).numbers_column}}
      line:
        shape: spline
        color: orange

  - name: Average Value
    props:
      type: indicator
      value: ?{avg(${ref(Numbers From Remote CSV).numbers_column})}
      number:
        font:
          size: 35
        suffix: " avg"
      domain:
        y: [0, .7]
        x: [.5, 1]
  - name: Total Value
    props:
      type: indicator
      value: ?{sum(${ref(Numbers From Remote CSV).numbers_column})}
      number:
        font:
          size: 35
        suffix: " sum"
      domain:
        y: [.5, 1]
        x: [.2, .5]
