sources:
  - name: series-of-numbers-source
    type: duckdb
    database: target/seeds/series_of_numbers.duckdb
    seeds:
      - table_name: model
        args: ["curl", "-s", "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/y_values.csv"]
models:
  - name: series-of-numbers
    source: ${ref(series-of-numbers-source)}
    sql: select * from model

charts:
  - name: duel-axis
    layout:
      title:
        text: "Dual Axis"
      legend:
        orientation: "h"
      yaxis:
        title:
          text: "yaxis title"
          font:
            size: 18
            color: "#713B57"
      yaxis2:
        title:
          text: "yaxis2 title"
          font:
            size: 18
            color: orange
        side: right
        overlaying: "y"
        anchor: "y"
        showgrid: false
    insights:
      - ${ref(yaxis2-trace)}
      - ${ref(yaxis-trace)}
insights:
  - name: yaxis-trace
    props:
      type: bar
      y: ?{${ref(series-of-numbers).numbers_column}}
      marker:
        color: "#713B57"
        opacity: .7
    interactions:
      - sort: ?{${ref(series-of-numbers).numbers_column}}
  - name: yaxis2-trace
    props:
      type: scatter
      y: ?{ (500 -  ${ref(series-of-numbers).numbers_column}) }
      yaxis: "y2"
      line:
        shape: spline
        smoothing: .1
        color: orange

    interactions:
      - sort: ?{${ref(series-of-numbers).numbers_column}}
