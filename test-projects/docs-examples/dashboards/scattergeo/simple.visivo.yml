models:
  - name: scattergeo-data
    args:
      - echo
      - |
        lon,lat
        -75,40
        -80,25
        -120,47
        -100,35
        -90,30
charts:
  - name: simple-scattergeo-chart
    layout:
      title:
        text: Simple Scattergeo Plot<br><sub>Geographical Data Points</sub>
      geo:
        scope: "usa"
    insights:
      - ${ref(simple-scattergeo-plot)}
insights:
  - name: simple-scattergeo-plot
    props:
      type: scattergeo
      lon: ?{${ref(scattergeo-data).lon}}
      lat: ?{${ref(scattergeo-data).lat}}
      mode: "markers"
