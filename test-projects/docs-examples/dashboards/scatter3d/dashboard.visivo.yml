        items: 
        - markdown:
            content: |
              # Scatter3D Dashboard

              This dashboard demonstrates different ways to create 3D scatter plots using the `scatter3d` trace type.
      - items: 
          - chart: ${ref(simple-scatter3d-chart)}
          - chart: ${ref(scatter3d-chart-with-lines)}
      - items: 
        - chart: ${ref(scatter3d-chart-with-custom-markers)} 