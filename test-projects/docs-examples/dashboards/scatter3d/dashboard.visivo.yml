includes:
  - path: simple.visivo.yml
  - path: lines.visivo.yml
  - path: custom-markers.visivo.yml

dashboards:
  - name: scatter3d-dashboard
    level: 1
    tags:
      - scatter3d
      - 3d
      - visualization
    rows:
