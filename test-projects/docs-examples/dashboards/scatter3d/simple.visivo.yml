models:
  - name: scatter3d-data
    args:
      - echo
      - |
        x,y,z
        1,10,15
        2,20,25
        3,15,30
        4,25,35
        5,30,40
charts:
  - name: simple-scatter3d-chart
    layout:
      title:
        text: Simple Scatter3D Plot<br><sub>3D Data Points</sub>
    insights:
      - ${ref(simple-scatter3d-plot)}
insights:
  - name: simple-scatter3d-plot
    props:
      type: scatter3d
      x: ?{${ref(scatter3d-data).x}}
      y: ?{${ref(scatter3d-data).y}}
      z: ?{${ref(scatter3d-data).z}}
      mode: "markers"
