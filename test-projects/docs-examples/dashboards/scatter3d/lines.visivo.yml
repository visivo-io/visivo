models:
  - name: scatter3d-data-lines
    args:
      - echo
      - |
        x,y,z
        1,5,7
        2,10,12
        3,8,10
        4,15,18
        5,12,17
charts:
  - name: scatter3d-chart-with-lines
    layout:
      title:
        text: Scatter3D Plot with Lines<br><sub>Connecting Data Points with Lines</sub>
    insights:
      - ${ref(scatter3d-plot-with-lines)}
insights:
  - name: scatter3d-plot-with-lines
    props:
      type: scatter3d
      x: ?{${ref(scatter3d-data-lines).x}}
      y: ?{${ref(scatter3d-data-lines).y}}
      z: ?{${ref(scatter3d-data-lines).z}}
      mode: "lines+markers"
