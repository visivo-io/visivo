models:
  - name: contourcarpet-data-filled
    args:
      - echo
      - |
        a,b,x,y,z
        0,0,2,3,5
        1,0,3,4,10
        2,0,4,5,15
        0,1,5,6,20
        1,1,6,7,25
        2,1,7,8,30
        0,2,8,9,35
        1,2,9,10,40
        2,2,10,11,45
charts:
  - name: Filled Contourcarpet Chart
    layout:
      title:
        text: Filled Contourcarpet Plot<br><sub>Filled Contour Plot over a Carpet</sub>
      xaxis:
        title:
          text: "X Axis"
      yaxis:
        title:
          text: "Y Axis"
    insights:
      - ${ref(Filled Contourcarpet Plot)}
      - ${ref(Carpet Plot Filled)}
insights:
  - name: Carpet Plot Filled
    props:
      type: carpet
      a: ?{${ref(contourcarpet-data-filled).a}}
      b: ?{${ref(contourcarpet-data-filled).b}}
      x: ?{${ref(contourcarpet-data-filled).x}}
      y: ?{${ref(contourcarpet-data-filled).y}}
  - name: Filled Contourcarpet Plot
    props:
      type: contourcarpet
      carpet: ${ref(Carpet Plot Filled)}
      z: ?{${ref(contourcarpet-data-filled).z}}
      colorscale: "Earth"
      contours:
        coloring: "fill"
        showlines: true
