models:
  - name: contourcarpet-data-custom
    args:
      - echo
      - |
        a,b,x,y,z
        0,0,1,1,10
        1,0,2,2,20
        2,0,3,3,30
        0,1,4,4,40
        1,1,5,5,50
        2,1,6,6,60
        0,2,7,7,70
        1,2,8,8,80
        2,2,9,9,90
charts:
  - name: Custom Contourcarpet Chart
    layout:
      title:
        text: Custom Contourcarpet Plot<br><sub>Customized Contour Levels on a Carpet</sub>
      xaxis:
        title:
          text: "X Axis"
      yaxis:
        title:
          text: "Y Axis"
    insights:
      - ${ref(Custom Contourcarpet Plot)}
      - ${ref(Carpet Plot Custom)}
insights:
  - name: Carpet Plot Custom
    props:
      type: carpet
      a: ?{${ref(contourcarpet-data-custom).a}}
      b: ?{${ref(contourcarpet-data-custom).b}}
      x: ?{${ref(contourcarpet-data-custom).x}}
      y: ?{${ref(contourcarpet-data-custom).y}}
  - name: Custom Contourcarpet Plot
    props:
      type: contourcarpet
      carpet: ${ref(Carpet Plot Custom)}
      z: ?{${ref(contourcarpet-data-custom).z}}
      colorscale: "Jet"
      contours:
        start: 10
        end: 90
        size: 10
