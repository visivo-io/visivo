models:
  - name: contourcarpet-data
    args:
      - echo
      - |
        a,b,x,y,z
        1,1,2,3,10
        2,1,3,4,15
        3,1,4,5,20
        1,2,5,6,25
        2,2,6,7,30
        3,2,7,8,35
        1,3,8,9,40
        2,3,9,10,45
        3,3,10,11,50
charts:
  - name: Simple Contourcarpet Chart
    layout:
      title:
        text: Simple Contourcarpet Plot<br><sub>Contour Plot over a Carpet</sub>
      xaxis:
        title:
          text: "X Axis"
      yaxis:
        title:
          text: "Y Axis"
    insights:
      - ${ref(Simple Contourcarpet Plot)}
      - ${ref(Carpet Plot)}
insights:
  - name: Carpet Plot
    props:
      type: carpet
      a: ?{${ref(contourcarpet-data).a}}
      b: ?{${ref(contourcarpet-data).b}}
      x: ?{${ref(contourcarpet-data).x}}
      y: ?{${ref(contourcarpet-data).y}}
  - name: Simple Contourcarpet Plot
    props:
      type: contourcarpet
      carpet: ${ref(Carpet Plot)}
      z: ?{${ref(contourcarpet-data).z}}
      colorscale: "Viridis"
