sources:
  - name: carpet-grid-source
    type: duckdb
    database: target/seeds/carpet_grid.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            a,b,y
            4,1,2
            4,2,3.5
            4,3,4
            4.5,1,3
            4.5,2,4.5
            4.5,3,5
            5,1,5.5
            5,2,6.5
            5,3,7.5
            6,1,8
            6,2,8.5
            6,3,10
  - name: scattercarpet-data-source
    type: duckdb
    database: target/seeds/scattercarpet_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            a,b,value
            4,1.5,15
            4.5,2.5,25
            5,1.5,30
            6,2.5,40
models:
  - name: carpet-grid
    source: ${ref(carpet-grid-source)}
    sql: select * from model
  - name: scattercarpet-data
    source: ${ref(scattercarpet-data-source)}
    sql: select * from model
charts:
  - name: simple-scattercarpet-chart
    layout:
      title:
        text: Simple Scattercarpet Plot<br><sub>2D Data Points on Carpet Axis</sub>
    insights:
      - ${ref(carpet-grid-trace)}
      - ${ref(simple-scattercarpet-plot-trace)}
insights:
  - name: carpet-grid-trace
    props:
      type: carpet
      a: ?{${ref(carpet-grid).a}}
      b: ?{${ref(carpet-grid).b}}
      y: ?{${ref(carpet-grid).y}}
      aaxis:
        tickprefix: 'a = '
        ticksuffix: 'm'
        smoothing: 1
        minorgridcount: 9
      baxis:
        tickprefix: 'b = '
        ticksuffix: 'Pa'
        smoothing: 1
        minorgridcount: 9
  - name: simple-scattercarpet-plot-trace
    props:
      type: scattercarpet
      a: ?{${ref(scattercarpet-data).a}}
      b: ?{${ref(scattercarpet-data).b}}
      mode: "markers"
