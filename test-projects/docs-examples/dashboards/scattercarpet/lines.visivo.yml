models:
  - name: carpet-grid-lines
    args:
      - echo
      - |
        a,b,y
        4,1,2
        4,2,3.5
        4,3,4
        4.5,1,3
        4.5,2,4.5
        4.5,3,5
        5,1,5.5
        5,2,6.5
        5,3,7.5
        6,1,8
        6,2,8.5
        6,3,10
  - name: scattercarpet-data-lines
    args:
      - echo
      - |
        a,b,value
        4,1,7
        4.5,2,12
        5,1.5,10
        6,2.5,18
        5,2,17
charts:
  - name: scattercarpet-chart-with-lines
    layout:
      title:
        text: Scattercarpet Plot with Lines<br><sub>Connecting Data Points on Carpet Axis</sub>
    insights:
      - ${ref(carpet-grid-lines-trace)}
      - ${ref(scattercarpet-plot-with-lines-trace)}
insights:
  - name: carpet-grid-lines-trace
    props:
      type: carpet
      a: ?{${ref(carpet-grid-lines).a}}
      b: ?{${ref(carpet-grid-lines).b}}
      y: ?{${ref(carpet-grid-lines).y}}
      aaxis:
        tickprefix: 'a = '
        ticksuffix: 'm'
        smoothing: 1
        minorgridcount: 9
      baxis:
        tickprefix: 'b = '
        ticksuffix: 'Pa'
        smoothing: 1
        minorgridcount: 9
  - name: scattercarpet-plot-with-lines-trace
    props:
      type: scattercarpet
      a: ?{${ref(scattercarpet-data-lines).a}}
      b: ?{${ref(scattercarpet-data-lines).b}}
      mode: "lines+markers"
