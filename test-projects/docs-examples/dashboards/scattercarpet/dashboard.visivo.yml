includes:
  - path: simple.visivo.yml
  - path: lines.visivo.yml
  - path: custom-markers.visivo.yml

dashboards:
  - name: scattercarpet-dashboard
    level: 1
    tags:
      - scattercarpet
      - 2d
      - visualization
    rows:
      - height: compact
        items:
          - markdown:
              content: |
                # Scattercarpet Dashboard

                This dashboard demonstrates different ways to create scatter plots on a carpet axis using the `scattercarpet` trace type.
      - height: medium
        items:
          - chart: ${ref(simple-scattercarpet-chart)}
          - chart: ${ref(scattercarpet-chart-with-lines)}
      - height: medium
        items:
          - chart: ${ref(scattercarpet-chart-with-custom-markers)} 