models:
  - name: scattergl-data
    args:
      - echo
      - |
        x,y
        1,10
        2,20
        3,15
        4,25
        5,30
charts:
  - name: simple-scattergl-chart
    layout:
      title:
        text: Simple Scattergl Plot<br><sub>High-Performance Scatter Plot with WebGL</sub>
    insights:
      - ${ref(simple-scattergl-plot)}
insights:
  - name: simple-scattergl-plot
    props:
      type: scattergl
      x: ?{${ref(scattergl-data).x}}
      y: ?{${ref(scattergl-data).y}}
      mode: "markers"
