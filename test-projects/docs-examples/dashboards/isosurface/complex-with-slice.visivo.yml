models:
  - name: isosurface-data
    args:
      - curl
      - "-s"
      - https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/fractal-cubic.csv

charts:
  - name: complex-with-slice-isosurface-chart
    layout:
      title:
        text: Complex With SSlice Isosurface Plot<br><sub>3D Volume Visualization</sub>
      margin:
        t: 50
        b: 20
      scene:
        camera:
          eye:
            x: 1.86
            y: 0.61
            z: 0.98
    insights:
      - ${ref(complex-with-slice-isosurface-plot)}
insights:
  - name: complex-with-slice-isosurface-plot
    props:
      type: isosurface
      x: ?{${ref(isosurface-data).x}}
      y: ?{${ref(isosurface-data).y}}
      z: ?{${ref(isosurface-data).z}}
      value: ?{${ref(isosurface-data).value}}
      isomin: -100
      isomax: 100
      surface:
        show: true
        count: 1
        fill: .8
      slices:
        z:
          show: true
          locations:
            - -0.1
      caps:
        x:
          show: false
        y:
          show: false
        z:
          show: false
    interactions:
      - sort: ?{${ref(isosurface-data).idx} ASC}
