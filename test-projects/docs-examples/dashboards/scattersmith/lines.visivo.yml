sources:
  - name: scattersmith-data-lines-source
    type: duckdb
    database: target/seeds/scattersmith_data_lines.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            real,imaginary
            0.2,0.1
            0.5,0.4
            0.7,0.6
            1.0,0.8
models:
  - name: scattersmith-data-lines
    source: ${ref(scattersmith-data-lines-source)}
    sql: select * from model
charts:
  - name: scattersmith-chart-with-lines
    layout:
      title:
        text: Scattersmith Plot with Lines<br><sub>Connecting Data Points on Smith Chart</sub>
    insights:
      - ${ref(scattersmith-plot-with-lines)}
insights:
  - name: scattersmith-plot-with-lines
    props:
      type: scattersmith
      real: ?{real}
      imag: ?{${ref(scattersmith-data-lines).imaginary}}
      mode: "lines+markers"
