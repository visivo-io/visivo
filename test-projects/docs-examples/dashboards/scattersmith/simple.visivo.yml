sources:
  - name: scattersmith-data-source
    type: duckdb
    database: target/seeds/scattersmith_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            real,imaginary
            0.5,0.2
            0.8,0.3
            1.0,0.5
            1.2,0.7
models:
  - name: scattersmith-data
    source: ${ref(scattersmith-data-source)}
    sql: select * from model
charts:
  - name: simple-scattersmith-chart
    layout:
      title:
        text: Simple Scattersmith Plot<br><sub>Data Points on Smith Chart</sub>
    insights:
      - ${ref(simple-scattersmith-plot)}
insights:
  - name: simple-scattersmith-plot
    props:
      type: scattersmith
      real: ?{real}
      imag: ?{${ref(scattersmith-data).imaginary}}
      mode: "markers"
