sources:
  - name: monty-python-quest-data-unique-source
    type: duckdb
    database: target/seeds/monty_python_quest_data_unique.duckdb
    seeds:
      - table_name: model
        args:
          - curl
          - "-s"
          - "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/monty_python_quests.csv"
models:
  - name: monty-python-quest-data-unique
    source: ${ref(monty-python-quest-data-unique-source)}
    sql: select * from model
charts:
  - name: rewards-distribution-box-plot
    layout:
      title:
        text: Horizontal Box Plot<br><sub>GBP Rewards Earned Across Quests</sub>
      xaxis:
        title:
          text: "Reward (GBP)"
    insights:
      - ${ref(rewards-distribution-by-quest)}
insights:
  - name: rewards-distribution-by-quest
    props:
      type: box
      y: ?{${ref(monty-python-quest-data-unique).person}}
      x: ?{${ref(monty-python-quest-data-unique).reward_gbp}}
      boxpoints: "all"
      jitter: 1
      pointpos: -1.1
      orientation: h
    interactions:
      - split: ?{${ref(monty-python-quest-data-unique).person}}
