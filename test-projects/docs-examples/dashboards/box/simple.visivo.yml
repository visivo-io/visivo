models:
  - name: sample-data
    args:
      - echo
      - |
        category,value
        A,23
        A,15
        A,18
        A,30
        A,28
        B,40
        B,35
        B,31
        B,25
        B,29
charts:
  - name: sample-box-plot-chart
    layout:
      title:
        text: Simple Box Plot<br><sub>Distribution of Values by Category</sub>
      xaxis:
        title:
          text: "Category"
      yaxis:
        title:
          text: "Value"
    insights:
      - ${ref(sample-box-plot)}
insights:
  - name: sample-box-plot
    props:
      type: box
      x: ?{${ref(sample-data).category}}
      y: ?{${ref(sample-data).value}}
      boxpoints: "all"
      jitter: 1
      pointpos: -1.1
