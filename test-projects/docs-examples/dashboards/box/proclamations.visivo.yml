sources:
  - name: monty-python-quest-proclamations-source
    type: duckdb
    database: target/seeds/monty_python_quest_proclamations.duckdb
    seeds:
      - table_name: model
        args:
          - curl
          - "-s"
          - "https://raw.githubusercontent.com/visivo-io/data/refs/heads/main/monty_python_quests.csv"
models:
  - name: monty-python-quest-proclamations
    source: ${ref(monty-python-quest-proclamations-source)}
    sql: select * from model
charts:
  - name: proclamations-box-plot-with-outliers
    layout:
      title:
        text: Cohorted Box Plot<br><sub>Proclamations Made Across Quests by Enemy</sub>
      xaxis:
        title:
          text: "Enemy"
      boxmode: group
      yaxis:
        title:
          text: "Proclamations Made"
    insights:
      - ${ref(proclamations-box-plot)}
insights:
  - name: proclamations-box-plot
    props:
      type: box
      y: ?{${ref(monty-python-quest-proclamations).proclamations_made}}
      x: ?{${ref(monty-python-quest-proclamations).enemy_encountered}}

    interactions:
      - split: ?{${ref(monty-python-quest-proclamations).person}}
