models:
  - name: emoji_data
    args:
      - echo
      - |
        x,y
        1,2
        2,4
        3,8
        4,6
        5,10

charts:
  - name: Emoji Points Example
    layout:
      title:
        text: Data Points with Emoji Annotations
      annotations:
        - x: 3
          y: 8
          text: "🔥"
          showarrow: true
          arrowhead: 2
          hovertext: "Peak Performance"
          ax: 20
          ay: -30
          font:
            size: 16
        - x: 4
          y: 6
          text: "📉"
          showarrow: true
          arrowhead: 2
          hovertext: "Declining Trend"
          ax: -20
          ay: 30
          font:
            size: 16
    insights:
      - ${ref(emoji_trace)}
insights:
  - name: emoji_trace
    props:
      type: scatter
      x: ?{${ref(emoji_data).x}}
      y: ?{${ref(emoji_data).y}}
      mode: markers
      marker:
        color: green
    interactions:
      - sort: ?{ ${ref(emoji_data).x} ASC }
