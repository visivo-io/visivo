sources:
  - name: vertical_threshold_data-source
    type: duckdb
    database: target/seeds/vertical_threshold_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            x,y
            1,2
            2,4
            3,8
            4,6
            5,10

models:
  - name: vertical_threshold_data
    source: ${ref(vertical_threshold_data-source)}
    sql: select * from model
charts:
  - name: vertical-threshold-example
    layout:
      title:
        text: Vertical Threshold Line Example
      shapes:
        - type: line
          x0: 3
          x1: 3
          y0: 0
          y1: 10
          line:
            color: orange
            width: 2
            dash: dot
    insights:
      - ${ ref(vertical_line_trace) }
insights:
  - name: vertical_line_trace
    props:
      type: scatter
      x: ?{${ref(vertical_threshold_data).x}}
      y: ?{${ref(vertical_threshold_data).y}}
      mode: lines
      line:
        color: green
    interactions:
      - sort: ?{ ${ref(vertical_threshold_data).x} ASC }
