sources:
  - name: line_data-source
    type: duckdb
    database: target/seeds/line_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            x,y
            1,5
            2,8
            3,6
            4,10
            5,12

models:
  - name: line_data
    source: ${ref(line_data-source)}
    sql: select * from model
charts:
  - name: threshold-line-example
    layout:
      title:
        text: Threshold Line Example
      shapes:
        - type: line
          x0: 1
          x1: 5
          y0: 8
          y1: 8
          line:
            color: red
            width: 2
            dash: dash
    insights:
      - ${ref(line_trace)}
insights:
  - name: line_trace
    props:
      type: scatter
      x: ?{${ref(line_data).x}}
      y: ?{${ref(line_data).y}}
      mode: lines
      line:
        color: blue
    interactions:
      - sort: ?{ ${ref(line_data).x} ASC }
