models:
  - name: line_data
    args:
      - echo
      - |
        x,y
        1,5
        2,8
        3,6
        4,10
        5,12

charts:
  - name: Threshold Line Example
    layout:
      title:
        text: Threshold Line Example
      shapes:
        - type: line
          x0: 1
          x1: 5
          y0: 8
          y1: 8
          line:
            color: red
            width: 2
            dash: dash
    insights:
      - ${ref(line_trace)}
insights:
  - name: line_trace
    props:
      type: scatter
      x: ?{${ref(line_data).x}}
      y: ?{${ref(line_data).y}}
      mode: lines
      line:
        color: blue
    interactions:
      - sort: ?{ ${ref(line_data).x} ASC }
