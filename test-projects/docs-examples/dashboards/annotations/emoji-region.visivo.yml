models:
  - name: region_emoji_data
    args:
      - echo
      - |
        x,y
        1,2
        2,4
        3,6
        4,8
        5,10

charts:
  - name: Emoji Region Example
    layout:
      title:
        text: Region with Emoji Annotations
      shapes:
        - type: rect
          x0: 2
          x1: 4
          y0: 4
          y1: 8
          line:
            color: rgba(255, 192, 0, 1)
            width: 2
          fillcolor: rgba(255, 192, 0, 0.2)
      annotations:
        - x: 3
          y: 6
          text: "🎯"
          showarrow: true
          arrowhead: 2
          hovertext: "Target Zone"
          ax: 0
          ay: -40
          font:
            size: 16
    insights:
      - ${ref(region_emoji_trace)}
insights:
  - name: region_emoji_trace
    props:
      type: scatter
      x: ?{${ref(region_emoji_data).x}}
      y: ?{${ref(region_emoji_data).y}}
      mode: lines+markers
      line:
        color: purple
    interactions:
      - sort: ?{ ${ref(region_emoji_data).x} ASC }
