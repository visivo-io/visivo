models:
  - name: threshold_annotation_data
    args:
      - echo
      - |
        x,y
        1,3
        2,6
        3,9
        4,12
        5,15

charts:
  - name: Threshold with Annotation Example
    layout:
      title:
        text: Threshold with Annotation
      shapes:
        - type: line
          x0: 1
          x1: 5
          y0: 9
          y1: 9
          line:
            color: red
            width: 2
            dash: solid
      annotations:
        - x: 3
          y: 9
          text: "Critical Threshold"
          showarrow: true
          arrowhead: 3
          ax: 0
          ay: -40
          font:
            size: 14
            color: black
    insights:
      - ${ ref(threshold_annotation_trace) }
insights:
  - name: threshold_annotation_trace
    props:
      type: scatter
      x: ?{${ref(threshold_annotation_data).x}}
      y: ?{${ref(threshold_annotation_data).y}}
      mode: lines
      line:
        color: purple
    interactions:
      - sort: ?{ ${ref(threshold_annotation_data).x} ASC }
