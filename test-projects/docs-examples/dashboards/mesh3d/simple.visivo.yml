models:
  - name: mesh3d-data
    args:
      - echo
      - |
        idx,x,y,z,i,j,k,color
        0,0,0,0,0,1,2,#1f77b4
        1,1,0,2,0,2,3,#ff7f0e
        2,2,1,0,0,3,1,#2ca02c
        3,0,2,1,1,2,3,#9467bd

charts:
  - name: Simple Mesh3D Chart
    layout:
      title:
        text: Simple Mesh3D Plot<br><sub>3D Mesh Surface Visualization</sub>
    insights:
      - ${ref(Simple Mesh3D Plot)}
insights:
  - name: Simple Mesh3D Plot
    props:
      type: mesh3d
      x: ?{${ref(mesh3d-data).x}}
      y: ?{${ref(mesh3d-data).y}}
      z: ?{${ref(mesh3d-data).z}}
      i: ?{${ref(mesh3d-data).i}}
      j: ?{${ref(mesh3d-data).j}}
      k: ?{${ref(mesh3d-data).k}}
      facecolor: ?{${ref(mesh3d-data).color}}
      opacity: 0.7
    interactions:
      - sort: ?{ ${ref(mesh3d-data).idx} ASC}
