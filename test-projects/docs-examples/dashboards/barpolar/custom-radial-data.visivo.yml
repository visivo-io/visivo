models:
  - name: custom-radial-data
    args:
      - echo
      - |
        direction,radial_start,radial_end
        0,1,3
        60,2,5
        120,3,6
        180,1,4
        240,2,7
        300,3,5
charts:
  - name: Custom Radial Barpolar Chart
    layout:
      polar:
        radialaxis:
          visible: true
      margin:
        l: 0
        r: 0
        b: 40
      title:
        text: Polar Bar with Custom Radial Range<br><sub>Bars Starting and Ending at Custom Radial Positions</sub>
    insights:
      - ${ref(Custom Radial Barpolar)}
insights:
  - name: Custom Radial Barpolar
    props:
      type: barpolar
      theta: ?{${ref(custom-radial-data).direction}}
      width: 30
      r0: 1
      dr: 2
      marker:
        color: "#d62728"
      opacity: 0.8
    interactions:
      - sort: ?{${ref(custom-radial-data).direction}}
