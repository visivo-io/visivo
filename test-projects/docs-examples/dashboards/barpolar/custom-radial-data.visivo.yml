sources:
  - name: custom-radial-data-source
    type: duckdb
    database: target/seeds/custom_radial_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            direction,radial_start,radial_end
            0,1,3
            60,2,5
            120,3,6
            180,1,4
            240,2,7
            300,3,5
models:
  - name: custom-radial-data
    source: ${ref(custom-radial-data-source)}
    sql: select * from model
charts:
  - name: custom-radial-barpolar-chart
    layout:
      polar:
        radialaxis:
          visible: true
      margin:
        l: 0
        r: 0
        b: 40
      title:
        text: Polar Bar with Custom Radial Range<br><sub>Bars Starting and Ending at Custom Radial Positions</sub>
    insights:
      - ${ref(custom-radial-barpolar)}
insights:
  - name: custom-radial-barpolar
    props:
      type: barpolar
      theta: ?{${ref(custom-radial-data).direction}}
      width: 30
      r0: 1
      dr: 2
      marker:
        color: "#d62728"
      opacity: 0.8
    interactions:
      - sort: ?{${ref(custom-radial-data).direction}}
