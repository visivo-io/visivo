models:
  - name: activity-data
    args:
      - echo
      - |
        direction,activity_level
        0,5
        45,10
        90,2
        135,8
        180,4
        225,6
        270,7
        315,3
charts:
  - name: activity-level-polar-chart
    layout:
      polar:
        radialaxis:
          ticksuffix: "%"
          tickangle: 0
          tick0: 0
          dtick: 2
        angularaxis:
          rotation: 180
      margin:
        l: 0
        r: 0
        b: 40
      title:
        text: Simple Barpolar Chart<br><sub>Activity Level by Direction</sub>
    insights:
      - ${ref(activity-level-by-direction)}
insights:
  - name: activity-level-by-direction
    props:
      type: barpolar
      r: ?{${ref(activity-data).activity_level}}
      theta: ?{${ref(activity-data).direction}}
      marker:
        color: "#1f77b4"
    interactions:
      - sort: ?{${ref(activity-data).direction}}
