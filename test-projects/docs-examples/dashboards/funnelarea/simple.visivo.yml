models:
  - name: funnelarea-data
    args:
      - echo
      - |
        stage,value
        Leads,1000
        Qualified Leads,750
        Opportunities,400
        Proposals,200
        Closed Deals,100
charts:
  - name: simple-funnelarea-chart
    layout:
      title:
        text: Simple Funnelarea Chart<br><sub>Proportional Sales Funnel</sub>
    insights:
      - ${ref(simple-funnelarea-plot)}
insights:
  - name: simple-funnelarea-plot
    props:
      type: funnelarea
      labels: ?{${ref(funnelarea-data).stage}}
      values: ?{${ref(funnelarea-data).value}}
