models:
  - name: sankey-data
    args:
      - echo
      - |
        source,target,value
        0,1,10
        0,2,5
        1,3,15
        2,3,5
charts:
  - name: simple-sankey-chart
    layout:
      title:
        text: Simple Sankey Diagram<br><sub>Flow of Resources Between Nodes</sub>
    insights:
      - ${ref(simple-sankey-diagram)}
insights:
  - name: simple-sankey-diagram
    props:
      type: sankey
      node:
        label: ["A", "B", "C", "D"]
      link:
        source: ?{${ref(sankey-data).source}}
        target: ?{${ref(sankey-data).target}}
        value: ?{${ref(sankey-data).value}}
