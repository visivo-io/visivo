sources:
  - name: sankey-data-colors-source
    type: duckdb
    database: target/seeds/sankey_data_colors.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            source,target,value,color
            0,1,10,#1f77b4
            0,2,5,#ff7f0e
            1,3,15,#2ca02c
            2,3,5,#d62728
models:
  - name: sankey-data-colors
    source: ${ref(sankey-data-colors-source)}
    sql: select * from model
charts:
  - name: custom-colors-sankey-chart
    layout:
      title:
        text: Sankey Diagram with Custom Colors<br><sub>Custom Colors for Nodes and Links</sub>
    insights:
      - ${ref(sankey-diagram-with-custom-colors)}
insights:
  - name: sankey-diagram-with-custom-colors
    props:
      type: sankey
      node:
        label: ["X", "Y", "Z", "W"]
        color: ?{${ref(sankey-data-colors).color}}
      link:
        source: ?{${ref(sankey-data-colors).source}}
        target: ?{${ref(sankey-data-colors).target}}
        value: ?{${ref(sankey-data-colors).value}}
