models:
  - name: sankey-data-hover
    args:
      - echo
      - |
        source,target,value
        0,1,20
        0,2,10
        1,3,15
        2,3,5
charts:
  - name: hover-info-sankey-chart
    layout:
      title:
        text: Sankey Diagram with Hover Information<br><sub>Hover Info Displaying Value and Relationships</sub>
    insights:
      - ${ref(sankey-diagram-with-hover-information)}
insights:
  - name: sankey-diagram-with-hover-information
    props:
      type: sankey
      node:
        label: ["P", "Q", "R", "S"]
      link:
        source: ?{${ref(sankey-data-hover).source}}
        target: ?{${ref(sankey-data-hover).target}}
        value: ?{${ref(sankey-data-hover).value}}
        hoverinfo: "all"
