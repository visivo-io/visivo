models:
  - name: scatterpolar-data
    args:
      - echo
      - |
        theta,r
        0,10
        45,20
        90,30
        135,25
        180,15
charts:
  - name: Simple Scatterpolar Chart
    layout:
      title:
        text: Simple Scatterpolar Plot<br><sub>Polar Data Points</sub>
    insights:
      - ${ref(Simple Scatterpolar Plot)}
insights:
  - name: Simple Scatterpolar Plot
    props:
      type: scatterpolar
      theta: ?{${ref(scatterpolar-data).theta}}
      r: ?{${ref(scatterpolar-data).r}}
      mode: "markers"
