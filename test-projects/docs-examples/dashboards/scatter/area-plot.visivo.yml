sources:
  - name: area-plot-data-source
    type: duckdb
    database: target/seeds/area_plot_data.duckdb
    seeds:
      - table_name: model
        args:
          - echo
          - |
            x,y
            1,5
            2,7
            3,10
            4,8
            5,12
            6,9
            7,11
models:
  - name: area-plot-data
    source: ${ref(area-plot-data-source)}
    sql: select * from model
charts:
  - name: area-plot-chart
    layout:
      title:
        text: Area Plot<br><sub>Filled Area Under the Line</sub>
    insights:
      - ${ref(area-plot)}
insights:
  - name: area-plot
    props:
      type: scatter
      x: ?{${ref(area-plot-data).x}}
      y: ?{${ref(area-plot-data).y}}
      mode: "lines"
      fill: "tozeroy"
      fillcolor: "rgba(55, 126, 184, 0.2)"
      line:
        color: "rgb(55, 126, 184)"
        width: 2
    interactions:
      - sort: ?{${ref(area-plot-data).x} ASC}
