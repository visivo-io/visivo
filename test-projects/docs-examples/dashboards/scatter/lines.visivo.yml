models:
  - name: scatter-data-lines
    args:
      - echo
      - |
        x,y
        1,5
        2,10
        3,8
        4,15
        5,12
charts:
  - name: scatter-chart-with-lines
    layout:
      title:
        text: Scatter Plot with Lines<br><sub>Connecting Data Points with Lines</sub>
      legend:
        orientation: h
      colorway: "High Contrast"
    insights:
      - ${ref(markers-and-line)}
      - ${ref(spline-no-markers)}
insights:
  - name: markers-and-line
    props:
      type: scatter
      x: ?{${ref(scatter-data-lines).x}}
      y: ?{${ref(scatter-data-lines).y}}
      mode: "lines+markers"
    interactions:
      - sort: ?{${ref(scatter-data-lines).x} ASC}
  - name: spline-no-markers
    props:
      type: scatter
      x: ?{${ref(scatter-data-lines).x}+3 - (${ref(scatter-data-lines).x}*${ref(scatter-data-lines).x})/3}
      y: ?{${ref(scatter-data-lines).y}*1.5}
      mode: "lines"
      line:
        shape: spline
        smoothing: .5 #Sets spline bend
    interactions:
      - sort: ?{${ref(scatter-data-lines).x}+3 - (${ref(scatter-data-lines).x}*${ref(scatter-data-lines).x})/3}
