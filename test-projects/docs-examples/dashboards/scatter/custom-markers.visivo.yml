models:
  - name: scatter-data-custom
    args:
      - echo
      - |
        x,y,size,color
        1,5,10,#1f77b4
        2,10,15,#ff7f0e
        3,8,20,#2ca02c
        4,15,25,#d62728
        5,12,30,#9467bd
charts:
  - name: Scatter Chart with Custom Markers
    layout:
      title:
        text: Scatter Plot with Custom Markers<br><sub>Custom Sizes and Colors for Data Points</sub>
    insights:
      - ${ref(Scatter Plot with Custom Markers)}
insights:
  - name: Scatter Plot with Custom Markers
    props:
      type: scatter
      x: ?{${ref(scatter-data-custom).x}}
      y: ?{${ref(scatter-data-custom).y}}
      mode: "markers"
      marker:
        size: ?{${ref(scatter-data-custom).size}}
        color: ?{${ref(scatter-data-custom).color}}
    interactions:
      - sort: ?{${ref(scatter-data-custom).x} ASC}
