models:
  - name: scatter-data
    args:
      - echo
      - |
        x,y
        1,10
        2,20
        3,15
        4,25
        5,30
        1.5,5
        2.5,22
        3.5,9
        4.5,21
        5.5,15

charts:
  - name: simple-scatter-chart
    layout:
      title:
        text: Simple Scatter Plot<br><sub>2D Data Points</sub>
    insights:
      - ${ref(simple-scatter-plot)}
insights:
  - name: simple-scatter-plot
    props:
      type: scatter
      x: ?{${ref(scatter-data).x}}
      y: ?{${ref(scatter-data).y}}
      mode: "markers"
      marker:
        size: 10
    interactions:
      - sort: ?{${ref(scatter-data).x} ASC}
