models:
  - name: indicator-data-gauge
    args:
      - echo
      - |
        value
        65
charts:
  - name: Gauge Indicator Chart
    layout:
      title:
        text: Gauge Indicator<br><sub>Progress Towards a Target</sub>
    insights:
      - ${ref(Gauge Indicator)}
insights:
  - name: Gauge Indicator
    props:
      type: indicator
      mode: "gauge+number"
      value: ?{${ref(indicator-data-gauge).value}}
      gauge:
        axis:
          range: [0, 100]
        bar:
          color: "#17becf"
