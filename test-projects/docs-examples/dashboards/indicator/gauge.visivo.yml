models:
  - name: indicator-data-gauge
    args:
      - echo
      - |-
        value,x
        65,0.5
        75,0.6
charts:
  - name: gauge-indicator-chart
    layout:
      title:
        text: Gauge Indicator<br><sub>Progress Towards a Target</sub>
    insights:
      - ${ref(gauge-indicator)}
insights:
  - name: gauge-indicator
    props:
      type: indicator
      mode: "gauge+number"
      value: ?{${ref(indicator-data-gauge).value}}[0]
      domain:
        x: [0, 1]
        y: [0, 0.9]