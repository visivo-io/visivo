models:
  - name: indicator-data
    args:
      - echo
      - |
        value
        75
sources:
  - name: name
    type: sqlite
    database: database
charts:
  - name: Simple Numeric Indicator Chart
    layout:
      title:
        text: Simple Numeric Indicator<br><sub>Displaying a Single Value</sub>
      margin:
        l: 0
        r: 0
        b: 50
    insights:
      - ${ref(Simple Numeric Indicator)}
insights:
  - name: Simple Numeric Indicator
    props:
      type: indicator
      mode: "number"
      value: ?{${ref(indicator-data).value}}
      number:
        suffix: "<sub>hrs</sub>"
        prefix: ?{case when ${ref(indicator-data).value} > 0 then '<sup>+</sup>' else '<sup>-</sup>' end}
        font:
          size: 100
