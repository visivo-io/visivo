models:
  - name: waterfall-data
    args:
      - echo
      - |
        idx,label,value
        0,Starting,1000
        1,Increase A,200
        2,Decrease B,-150
        3,Increase C,300
        4,Ending,1350
charts:
  - name: Simple Waterfall Chart
    layout:
      title:
        text: Simple Waterfall Plot<br><sub>Sequential Changes in Value</sub>
    insights:
      - ${ref(Simple Waterfall Plot)}
insights:
  - name: Simple Waterfall Plot
    props:
      type: waterfall
      x: ?{${ref(waterfall-data).label}}
      y: ?{${ref(waterfall-data).value}}
      measure: ["initial", "relative", "relative", "relative", "total"]
    interactions:
      - sort: ?{ ${ref(waterfall-data).idx} ASC}
