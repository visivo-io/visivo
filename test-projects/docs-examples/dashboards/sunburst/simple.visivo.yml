models:
  - name: sunburst-data
    args:
      - echo
      - |
        labels,parents,values
        Total,,100
        A,Total,40
        B,Total,30
        C,Total,30
        D,A,10
        E,A,20
        F,B,10
charts:
  - name: simple-sunburst-chart
    layout:
      title:
        text: Simple Sunburst Chart<br><sub>Hierarchical Data Visualization</sub>
    insights:
      - ${ref(simple-sunburst-plot)}
insights:
  - name: simple-sunburst-plot
    props:
      type: sunburst
      labels: ?{${ref(sunburst-data).labels}}
      parents: ?{${ref(sunburst-data).parents}}
      values: ?{"values"}
