models:
  - name: sunburst-data-colors
    args:
      - echo
      - |
        labels,parents,values,colors
        Total,,100,#1f77b4
        A,Total,40,#ff7f0e
        B,Total,30,#2ca02c
        C,Total,30,#d62728
        D,A,10,#9467bd
        E,A,20,#8c564b
        F,B,10,#e377c2
charts:
  - name: Sunburst Chart with Custom Colors
    layout:
      title:
        text: Sunburst Plot with Custom Colors<br><sub>Custom Colors for Each Category</sub>
    insights:
      - ${ref(Sunburst Plot with Custom Colors)}
insights:
  - name: Sunburst Plot with Custom Colors
    props:
      type: sunburst
      labels: ?{${ref(sunburst-data-colors).labels}}
      parents: ?{${ref(sunburst-data-colors).parents}}
      values: ?{"values"}
      marker:
        colors: ?{${ref(sunburst-data-colors).colors}}
