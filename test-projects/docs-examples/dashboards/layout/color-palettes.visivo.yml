dashboards:
  - name: color-palettes-in-visivo
    level: 0
    rows:
      - height: compact
        items:
          - markdown:
              content: |
                # Color Palettes in Visivo

                This dashboard demonstrates the various predefined color palettes available in Visivo,
                as well as how to use custom color palettes.
      - height: medium
        items:
          - chart: ${ref(warm-earth-tones)}
          - chart: ${ref(sunset-over-water)}
      - height: medium
        items:
          - chart: ${ref(muted-vintage)}
          - chart: ${ref(retro-pop)}
      - height: medium
        items:
          - chart: ${ref(forest-nightfall)}
          - chart: ${ref(desert-sunrise)}
      - height: medium
        items:
          - chart: ${ref(urban-dusk)}
          - chart: ${ref(botanical-garden)}
      - height: medium
        items:
          - chart: ${ref(autumn-ember)}
          - chart: ${ref(coastal-breeze)}
      - height: medium
        items:
          - chart: ${ref(muted-vintage-ii)}
          - chart: ${ref(muted-rosewood)}
      - height: medium
        items:
          - chart: ${ref(muted-classic)}
          - chart: ${ref(vintage-pastel)}
      - height: medium
        items:
          - chart: ${ref(classic-faded)}
          - chart: ${ref(spring-blossom)}
      - height: medium
        items:
          - chart: ${ref(mint-dream)}
          - chart: ${ref(soft-sunset)}
      - height: medium
        items:
          - chart: ${ref(lavender-fields)}
          - chart: ${ref(summer-breeze)}
      - height: medium
        items:
          - chart: ${ref(mint-dream-contrast)}
          - chart: ${ref(mint-dream-dark)}
      - height: medium
        items:
          - chart: ${ref(mint-dream-deep)}
          - chart: ${ref(mint-dream-bold)}
      - height: medium
        items:
          - chart: ${ref(high-contrast)}
          - chart: ${ref(high-contrast-earth)}
      - height: medium
        items:
          - chart: ${ref(custom-colors-example)}
          - markdown:
              content: |
                ### Using Custom Color Palettes

                You can define your own color palettes using a list of hex color codes:
                ```yaml
                layout:
                  colorway: ['#FF0000', '#00FF00', '#0000FF', ...]
                ```
insights:
  - name: color-palette-example
    props:
      type: bar
      x: ?{ 1 }
      y: ?{${ref(layout-data).value}}
      hovertemplate: "%{fullData.marker.color}<extra></extra>"
      orientation: h
    interactions:
      - split: ?{${ref(layout-data).category}}
