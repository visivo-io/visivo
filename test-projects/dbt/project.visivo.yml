name: dbt_name

dbt:
  enabled: true
  prefix: dbt

insights:
  - name: trace_name
    props:
      type: bar
      x: ?{${ref(dbt_fact_transaction).CREATED_AT}}
      y: ?{${ref(dbt_fact_transaction).AMOUNT}}

dashboards:
  - name: dashboard_name
    rows:
      - items:
          - chart:
              name: chart_name
              insights:
                - ${ref(trace_name)}
